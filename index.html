<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Pretty Pixie · Performance Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { background:#0d0c0b; color:#e7e5e4; font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; overflow-x:hidden; }
  .mono { font-family:'IBM Plex Mono',monospace; }
  .wrap { max-width:1280px; margin:0 auto; padding:0 1rem; }
  .card { background:rgba(28,25,23,.6); border:1px solid rgba(68,64,60,.5); border-radius:4px; }
  .sec-hd { font-family:'IBM Plex Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:.12em; color:#a8a29e; font-weight:600; margin-bottom:6px; }
  .kpi-grid { background:rgba(28,25,23,.4); border:1px solid rgba(68,64,60,.4); display:grid; grid-template-columns:repeat(2,1fr); }
  @media(min-width:640px){ .kpi-grid{grid-template-columns:repeat(4,1fr);} }
  @media(min-width:1024px){ .kpi-grid{grid-template-columns:repeat(7,1fr);} }
  .spin { display:inline-block; animation:spin 1s linear infinite; }
  @keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  .pulse { animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }
  .presets-scroll { display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; align-items:center; }
  .presets-scroll::-webkit-scrollbar { height:0; }
  .sd { animation:sd .15s ease-out; }
  @keyframes sd { from{opacity:0;transform:translateY(-3px);} to{opacity:1;transform:translateY(0);} }
  /* Status visuals */
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .dot.met       { background:#10b981; box-shadow:0 0 0 3px rgba(16,185,129,.18); }
  .dot.risk      { background:#f59e0b; box-shadow:0 0 0 3px rgba(245,158,11,.18); }
  .dot.under     { background:#ef4444; box-shadow:0 0 0 3px rgba(239,68,68,.18); }
  .dot.idle      { background:#57534e; }
  .chip { display:inline-flex; align-items:center; padding:2px 8px; border-radius:3px; font-size:10px; font-weight:700; font-family:'IBM Plex Mono',monospace; text-transform:uppercase; letter-spacing:.06em; white-space:nowrap; }
  .chip.met   { background:rgba(16,185,129,.12); color:#34d399; border:1px solid rgba(16,185,129,.25); }
  .chip.risk  { background:rgba(245,158,11,.12); color:#fbbf24; border:1px solid rgba(245,158,11,.25); }
  .chip.under { background:rgba(239,68,68,.12); color:#f87171; border:1px solid rgba(239,68,68,.25); }
  .chip.idle  { background:rgba(68,64,60,.3); color:#a8a29e; border:1px solid rgba(68,64,60,.5); }
  /* Big status banner */
  .status-banner { padding:18px 22px; border-radius:6px; border:1px solid; }
  .status-banner.met   { background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(16,185,129,.02)); border-color:rgba(16,185,129,.25); }
  .status-banner.risk  { background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(245,158,11,.02)); border-color:rgba(245,158,11,.25); }
  .status-banner.under { background:linear-gradient(135deg,rgba(239,68,68,.10),rgba(239,68,68,.02)); border-color:rgba(239,68,68,.30); }
  .status-banner.idle  { background:rgba(28,25,23,.5); border-color:rgba(68,64,60,.4); }
  /* Filter pills */
  .pill { font-family:'IBM Plex Mono',monospace; font-size:10px; padding:4px 10px; border:1px solid rgba(68,64,60,.6); color:#a8a29e; background:transparent; border-radius:3px; cursor:pointer; white-space:nowrap; text-transform:uppercase; letter-spacing:.04em; }
  .pill:hover { color:#e7e5e4; border-color:#78716c; }
  .pill.active { background:#f59e0b; border-color:#f59e0b; color:#0d0c0b; font-weight:700; }
  /* Target bar */
  .tbar { width:100%; height:5px; background:rgba(68,64,60,.4); border-radius:2px; overflow:hidden; }
  .tbar-fill { height:100%; transition:width .3s ease; }
  /* Row hover */
  .row-h:hover { background:rgba(255,255,255,.015); }
  /* Card hover lift */
  .lift { transition:all .12s ease; }
  .lift:hover { border-color:#78716c; transform:translateY(-1px); }
  /* Plain English status */
  .stat-pe { font-size:13px; font-weight:700; }
  .stat-pe.met   { color:#34d399; }
  .stat-pe.risk  { color:#fbbf24; }
  .stat-pe.under { color:#f87171; }
  .stat-pe.idle  { color:#78716c; }
  /* Section divider */
  .sec-divider { padding:24px 0 6px; border-top:1px dashed rgba(68,64,60,.3); margin-top:12px; }
  /* Print friendly for management showcase */
  @media print {
    body { background:white; color:black; }
    .no-print { display:none !important; }
    .card { border:1px solid #ccc; background:white; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="./config.js"></script>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useCallback, useMemo, useRef } = React;
const CFG = window.PIXIE_CONFIG;
const SLOTS = CFG.campaigns;
const SLOT_MAP = Object.fromEntries(SLOTS.map(c => [c.slot, c]));
const PHASE_START = new Date(CFG.phaseStartIST);
const BASE = `https://graph.facebook.com/${CFG.meta.apiVersion}`;
const ATTR = CFG.meta.attribution;
const FIELDS = 'spend,impressions,inline_link_clicks,clicks,reach,frequency,actions,action_values,conversions,unique_actions';

/* ═══ FORMATTERS ════════════════════════════════════════════════════ */
const inr   = n => n == null ? '—' : '₹' + Math.round(n).toLocaleString('en-IN');
const inrK  = n => { if (n==null) return '—'; const a=Math.abs(n); if(a>=100000) return (n<0?'−₹':'₹')+(Math.abs(n)/100000).toFixed(2)+'L'; if(a>=1000) return (n<0?'−₹':'₹')+(Math.abs(n)/1000).toFixed(1)+'k'; return inr(n); };
const inrL  = n => { if (n==null) return '—'; return (n<0?'−₹':'₹')+(Math.abs(n)/100000).toFixed(2)+'L'; };
const num   = n => n == null ? '—' : Number(n).toLocaleString('en-IN');
const pct   = (n, d=1) => n == null ? '—' : Number(n).toFixed(d) + '%';
const fx    = (n, d=2) => n == null ? '—' : Number(n).toFixed(d) + 'x';
const fmtV  = (v, fmt) => {
  if (v == null || isNaN(v)) return '—';
  if (fmt === 'x')  return Number(v).toFixed(2) + 'x';
  if (fmt === '₹')  return inr(v);
  if (fmt === 'L')  return inrL(v);
  if (fmt === '%')  return Number(v).toFixed(1) + '%';
  if (fmt === 'mo') return Number(v).toFixed(1) + ' mo';
  if (fmt === 'n')  return num(v);
  return v;
};
const fmtBand = (band, fmt) => {
  if (!band) return '—';
  const [lo, hi] = band;
  if (fmt === 'x')  return `${lo} – ${hi}x`;
  if (fmt === '%')  return `${lo} – ${hi}%`;
  if (fmt === '₹')  return `${inr(lo)} – ${inr(hi)}`;
  if (fmt === 'L')  return `${inrL(lo)} → ${inrL(hi)}`;
  if (fmt === 'mo') return `${lo} – ${hi} mo`;
  return `${lo} – ${hi}`;
};

/* ═══ PHASE DETECTION ══════════════════════════════════════════════ */
function currentPhase() {
  const now = new Date();
  const ms = Math.max(0, now - PHASE_START);
  const day = Math.floor(ms / 86400000) + 1;
  let cumulative = 0;
  for (const p of CFG.phases) {
    if (day <= cumulative + p.days) {
      return { ...p, dayOfPhase: day - cumulative, totalDay: day, phaseNo: p.n };
    }
    cumulative += p.days;
  }
  const last = CFG.phases[CFG.phases.length - 1];
  return { ...last, dayOfPhase: last.days, totalDay: day, phaseNo: last.n, postPhase: true };
}
const phaseKey = n => 'p' + n;
const daysInRange = daily => Math.max(1, daily?.length || 1);

/* ═══ STATUS / TAPG ════════════════════════════════════════════════ */
// status codes: 'met' / 'risk' / 'under' / 'idle'
const STATUS_LABEL = { met: 'ON TARGET', risk: 'AT RISK', under: 'BELOW TARGET', idle: 'NOT YET TRACKED' };
const STATUS_PE    = { met: 'Meeting the goal', risk: 'Close to goal · watch', under: 'Below goal · action needed', idle: 'Not enough data yet' };
const stColor = s => ({ met:'text-emerald-400', risk:'text-amber-400', under:'text-red-400', idle:'text-stone-500' }[s] || 'text-stone-500');
const stBg    = s => ({ met:'#10b981', risk:'#f59e0b', under:'#ef4444', idle:'#57534e' }[s] || '#57534e');

// Evaluate a value against a band [lo, hi]; for inverse, lower is better.
function evalBand(value, band, inverse) {
  if (value == null || !band) return 'idle';
  const [lo, hi] = band;
  if (inverse) {
    if (value <= lo) return 'met';
    if (value <= hi) return 'risk';
    return 'under';
  } else {
    if (value >= hi) return 'met';
    if (value >= lo) return 'risk';
    if (value >= lo * 0.85) return 'risk';
    return 'under';
  }
}

// TAPG = Target / Achieved / Pending / Gap
function tapg({ target, achieved, inverse=false, cumulative=false, band=null }) {
  let status='idle', pending=null, gap=null, gapPct=null;
  if (achieved == null || target == null) return { target, achieved, pending, gap, gapPct, status, band };
  if (cumulative) {
    pending = Math.max(0, target - achieved);
    gap = achieved - target;
    gapPct = target > 0 ? +(gap / target * 100).toFixed(1) : null;
    if (achieved >= target)              status = 'met';
    else if (achieved >= target * 0.85)  status = 'risk';
    else                                  status = 'under';
  } else if (inverse) {
    pending = achieved > target ? +(achieved - target).toFixed(2) : 0;
    gap = target - achieved;
    gapPct = target > 0 ? +((target - achieved) / target * 100).toFixed(1) : null;
    if (band) status = evalBand(achieved, band, true);
    else      status = achieved <= target ? 'met' : achieved <= target * 1.15 ? 'risk' : 'under';
  } else {
    pending = achieved < target ? +(target - achieved).toFixed(2) : 0;
    gap = achieved - target;
    gapPct = target > 0 ? +((achieved - target) / target * 100).toFixed(1) : null;
    if (band) status = evalBand(achieved, band, false);
    else      status = achieved >= target ? 'met' : achieved >= target * 0.85 ? 'risk' : 'under';
  }
  return { target, achieved, pending, gap, gapPct, status, band };
}

/* ═══ META API ═════════════════════════════════════════════════════ */
async function metaGet(token, path, query='') {
  const sep = query ? '&' : '';
  const r = await fetch(`${BASE}/${path}?${query}${sep}access_token=${token}`);
  const d = await r.json();
  if (d.error) throw new Error(d.error.message || 'Meta API error');
  return d;
}
function findConv(row, type, src='actions') {
  if (!row?.[src]) return 0;
  const m = row[src].find(a => a.action_type === type);
  return m ? parseFloat(m.value || 0) : 0;
}
function buildKpis(row) {
  if (!row) return { spend:0, revenue:0, purchases:0, cpa:null, roas:null, aov:null, impressions:0, clicks:0, linkClicks:0, ctr:null, cpc:null, ic:0, atc:0, icToPurchase:null, frequency:null, hookRate:null, reach:0 };
  const spend = parseFloat(row.spend || 0);
  const impressions = parseInt(row.impressions || 0);
  const linkClicks = parseInt(row.inline_link_clicks || 0) || findConv(row, 'link_click');
  const clicks = parseInt(row.clicks || 0);
  const reach = parseInt(row.reach || 0);
  const purchases = findConv(row, 'purchase') || findConv(row, 'offsite_conversion.fb_pixel_purchase');
  const revenue = findConv(row, 'purchase', 'action_values') || findConv(row, 'offsite_conversion.fb_pixel_purchase', 'action_values');
  const ic = findConv(row, 'initiate_checkout') || findConv(row, 'offsite_conversion.fb_pixel_initiate_checkout');
  const atc = findConv(row, 'add_to_cart') || findConv(row, 'offsite_conversion.fb_pixel_add_to_cart');
  const videoP3 = findConv(row, 'video_view') || findConv(row, 'video_3_sec_watched_actions');
  return {
    spend, impressions, clicks, linkClicks, reach,
    purchases, revenue, ic, atc,
    cpa: purchases > 0 ? Math.round(spend / purchases) : null,
    roas: spend > 0 ? +(revenue / spend).toFixed(2) : null,
    aov: purchases > 0 ? Math.round(revenue / purchases) : null,
    ctr: impressions > 0 ? +((clicks / impressions) * 100).toFixed(2) : null,
    cpc: clicks > 0 ? Math.round(spend / clicks) : null,
    icToPurchase: ic > 0 ? +((purchases / ic) * 100).toFixed(1) : null,
    frequency: reach > 0 ? +(impressions / reach).toFixed(2) : null,
    hookRate: impressions > 0 ? +((videoP3 / impressions) * 100).toFixed(1) : null,
  };
}
function slotFor(name) {
  if (!name) return null;
  const m = name.toUpperCase().match(/^(C\d+)[_\s\-·]/);
  return m && SLOT_MAP[m[1]] ? m[1] : null;
}

async function fetchAll(token, dateQ) {
  const accountPath = `act_${CFG.meta.accountId}`;
  const [camps, acct, ci, daily, campDaily, segments] = await Promise.all([
    metaGet(token, `${accountPath}/campaigns`, `fields=id,name,status,effective_status,daily_budget,lifetime_budget,start_time,objective&limit=100`),
    metaGet(token, `${accountPath}/insights`, `fields=${FIELDS}&${dateQ}&${ATTR}`),
    metaGet(token, `${accountPath}/insights`, `fields=campaign_id,campaign_name,${FIELDS}&level=campaign&${dateQ}&${ATTR}&limit=50`),
    metaGet(token, `${accountPath}/insights`, `fields=${FIELDS}&${dateQ}&${ATTR}&time_increment=1&limit=90`),
    metaGet(token, `${accountPath}/insights`, `fields=campaign_id,campaign_name,${FIELDS}&level=campaign&${dateQ}&${ATTR}&time_increment=1&limit=500`),
    metaGet(token, `${accountPath}/insights`, `fields=${FIELDS}&${dateQ}&${ATTR}&breakdowns=age,gender&limit=80`).catch(() => ({ data: [] })),
  ]);
  const acctK = buildKpis((acct.data || [])[0]) || {};
  const im = {}; (ci.data || []).forEach(r => { im[r.campaign_id] = r; });
  const dailyData = (daily.data || []).map(r => ({ date: r.date_start, ...buildKpis(r) }));
  const campaignDaily = {};
  (campDaily.data || []).forEach(r => {
    if (!campaignDaily[r.campaign_id]) campaignDaily[r.campaign_id] = [];
    campaignDaily[r.campaign_id].push({ date: r.date_start, ...buildKpis(r) });
  });
  Object.keys(campaignDaily).forEach(id => campaignDaily[id].sort((a,b) => a.date.localeCompare(b.date)));

  const segmentsAgg = (segments.data || []).map(r => ({ age: r.age, gender: r.gender, ...buildKpis(r) }));

  const campaigns = (camps.data || []).filter(c => c.effective_status !== 'DELETED').map(c => {
    const k = buildKpis(im[c.id]); const slot = slotFor(c.name); const cfg = slot ? SLOT_MAP[slot] : null;
    const eff = c.effective_status; const spend = k.spend || 0; let status = 'active';
    if (['PAUSED','CAMPAIGN_PAUSED'].includes(eff)) status = 'paused';
    else if (['DISAPPROVED','POLICY_VIOLATION'].includes(eff)) status = 'disapproved';
    else if (!im[c.id] || spend === 0) status = 'active_no_spend';
    else if (cfg && spend > cfg.killSpend && k.roas !== null && k.roas < cfg.killRoas) status = 'kill';
    return {
      id: c.id, name: c.name, slot, effectiveStatus: eff,
      dailyBudget: c.daily_budget ? Math.round(parseInt(c.daily_budget) / 100) : null,
      startTime: c.start_time, objective: c.objective, status,
      daily: campaignDaily[c.id] || [], ...k
    };
  }).sort((a,b) => (b.spend||0) - (a.spend||0));

  return {
    syncedAt: new Date().toISOString(), ...acctK,
    campaigns: campaigns.filter(c => c.slot),
    unmappedCampaigns: campaigns.filter(c => !c.slot),
    dailyData, campaignDaily, segments: segmentsAgg,
  };
}

async function fetchDetail(token, campaignId, dateQ) {
  const filter = encodeURIComponent(JSON.stringify([{ field:'campaign.id', operator:'EQUAL', value: campaignId }]));
  const accountPath = `act_${CFG.meta.accountId}`;
  const [sa, ai, adi, sads] = await Promise.all([
    metaGet(token, `${campaignId}/adsets`, `fields=id,name,daily_budget,status,effective_status&limit=50`),
    metaGet(token, `${accountPath}/insights`, `fields=adset_id,adset_name,${FIELDS}&level=adset&${dateQ}&${ATTR}&filtering=${filter}&limit=50`),
    metaGet(token, `${accountPath}/insights`, `fields=ad_id,ad_name,adset_id,${FIELDS}&level=ad&${dateQ}&${ATTR}&filtering=${filter}&limit=100`),
    metaGet(token, `${campaignId}/ads`, `fields=id,name,adset_id,status,effective_status&limit=100`),
  ]);
  const aim = {}; (ai.data || []).forEach(r => { aim[r.adset_id] = r; });
  const adim = {}; (adi.data || []).forEach(r => { adim[r.ad_id] = r; });
  const adsets = (sa.data || []).map(a => {
    const k = buildKpis(aim[a.id]);
    const db = a.daily_budget ? Math.round(parseInt(a.daily_budget) / 100) : null;
    return { id: a.id, name: a.name, dailyBudget: db, status: a.status, effectiveStatus: a.effective_status, hasSpend: !!(aim[a.id] && k.spend > 0), ...k };
  });
  const ads = (sads.data || []).map(a => {
    const k = buildKpis(adim[a.id]);
    return { id: a.id, name: a.name, adsetId: a.adset_id, effectiveStatus: a.effective_status, hasSpend: !!(adim[a.id] && k.spend > 0), ...k };
  });
  return { adsets, ads };
}

/* ═══ COMPUTED METRICS ═════════════════════════════════════════════ */
function computeActuals(data) {
  const out = {};
  out.mer = data.roas;
  out.aov = data.aov;
  out.cac = data.cpa;
  out.frequency = data.frequency;
  const rev = data.revenue || 0, spend = data.spend || 0, orders = data.purchases || 0;
  out.contribMargin = Math.round(rev * CFG.business.grossMargin - spend - orders * CFG.business.shippingPerOrder);
  // Conversion funnel metrics (all from Meta)
  out.ctr             = data.ctr;
  out.linkCtr         = data.impressions > 0 ? +((data.linkClicks / data.impressions) * 100).toFixed(2) : null;
  out.cvr             = data.linkClicks > 0 ? +((data.purchases  / data.linkClicks)   * 100).toFixed(2) : null;
  out.atcRate         = data.linkClicks > 0 ? +((data.atc        / data.linkClicks)   * 100).toFixed(2) : null;
  out.icToPurchaseKpi = data.ic         > 0 ? +((data.purchases  / data.ic)           * 100).toFixed(2) : null;
  out.hookRate        = data.hookRate;
  out.cpc             = data.cpc;
  // The rest are sourced from Shopify / Klaviyo etc — not available from Meta
  return out;
}

function computeKpiRows(data, actuals, phase) {
  const pk = phaseKey(phase.phaseNo);
  const rows = [];
  Object.entries(CFG.kpis).forEach(([key, kpi]) => {
    const band = kpi.bands?.[pk] || null;
    const actual = actuals[key];
    const t = tapg({ target: band ? band[0] : null, achieved: actual, inverse: kpi.inverse, band });
    rows.push({ key, kpi, band, actual, ...t });
  });
  return rows;
}

/* ═══ MARGIN RULES ENGINE ══════════════════════════════════════════ */
function evalMarginRules(data, actuals, phase) {
  const results = [];
  CFG.marginRules.forEach(rule => {
    let tripped = false, evidence = null, source = 'meta';
    if (rule.kpi && rule.threshold != null) {
      const v = actuals[rule.kpi];
      source = rule.source || 'meta';
      if (v == null) { results.push({ ...rule, status:'idle', evidence:'Needs '+source+' wiring' }); return; }
      if (rule.op === '>')  tripped = v > rule.threshold;
      if (rule.op === '<')  tripped = v < rule.threshold;
      if (rule.op === '>=') tripped = v >= rule.threshold;
      if (rule.op === '<=') tripped = v <= rule.threshold;
      evidence = `${CFG.kpis[rule.kpi]?.label || rule.kpi}: ${fmtV(v, CFG.kpis[rule.kpi]?.fmt || '')}`;
    } else if (rule.checkType === 'adset_roas_floor') {
      const bad = (data.campaigns || []).filter(c =>
        c.type !== 'reactivation' && (c.spend || 0) >= rule.spendGate && (c.roas != null) && c.roas < rule.threshold
      );
      tripped = bad.length > 0;
      evidence = tripped ? `${bad.length} campaign(s) below ${rule.threshold}x at ${inr(rule.spendGate)}+: ${bad.map(b=>b.slot).join(', ')}` : 'All campaigns above floor';
    } else if (rule.checkType === 'nc_roas_mask') {
      // can't compute NC-ROAS without Shopify wiring
      results.push({ ...rule, status:'idle', evidence:'Needs Shopify cohort wiring' }); return;
    } else if (rule.checkType === 'stage_mix') {
      const stages = { prospecting:0, retargeting:0, reactivation:0 };
      (data.campaigns||[]).forEach(c => { const t = SLOT_MAP[c.slot]?.type; if (t) stages[t] += (c.spend||0); });
      const total = stages.prospecting + stages.retargeting + stages.reactivation;
      if (total === 0) { results.push({ ...rule, status:'idle', evidence:'No spend yet' }); return; }
      const pk = phaseKey(phase.phaseNo);
      const targetMix = CFG.stageAllocation[pk];
      const actualProspectingPct = (stages.prospecting / total) * 100;
      tripped = actualProspectingPct > targetMix.prospecting + rule.overBy;
      evidence = `Prospecting at ${actualProspectingPct.toFixed(1)}% vs target ${targetMix.prospecting}% (±${rule.overBy}pp)`;
    } else if (rule.checkType === 'inventory') {
      results.push({ ...rule, status:'idle', evidence:'Needs Shopify inventory wiring' }); return;
    }
    results.push({ ...rule, status: tripped ? 'under' : 'met', evidence });
  });
  return results;
}

/* ═══ KILL RULES (per campaign) ════════════════════════════════════ */
function evalKillRule(camp) {
  if (!camp || camp.spend == null) return null;
  const t = SLOT_MAP[camp.slot]?.type;
  let pool = [];
  if (t === 'prospecting')                              pool = CFG.killRules.coldProspecting;
  else if (camp.slot === 'C7')                          pool = CFG.killRules.hotRetargetingDPA;
  else if (t === 'retargeting' && camp.slot !== 'C7')   pool = CFG.killRules.warmRetargeting;
  else if (t === 'reactivation')                        pool = CFG.killRules.reactivation;
  for (const r of pool) {
    if (camp.spend >= r.atSpend) {
      if (r.op === '<'  && camp.roas != null && camp.roas <  r.roas) return r;
      if (r.op === '>=' && camp.roas != null && camp.roas >= r.roas) return r;
    }
  }
  // Universal frequency check
  if (camp.frequency != null && camp.frequency > 3.5) return { level:'pause', action:'PAUSE until refresh ready', why:'Frequency over 3.5x without fresh creative', auto:true };
  if (camp.frequency != null && camp.frequency > 3.0) return { level:'refresh', action:'REFRESH creative immediately', why:'Frequency fatigue · creative refresh needed', auto:false };
  return null;
}

/* ═══ PER-AD ACTION ENGINE · Sheet 16 Section 3 thresholds ═════════ */
// Returns { level, text, why } for any ad — CONTEXT-AWARE.
// Considers parent ad set + parent campaign so we don't call something
// "Building signal" when its parent is bleeding out.
function evalAdAction(ad, cfg, parentAdSet, parentCampaign) {
  if (!ad || !ad.hasSpend) return { level: 'idle', text: 'No spend yet', why: '' };
  const spend = ad.spend || 0;
  const roas = ad.roas;
  const orders = ad.purchases || 0;
  const freq = ad.frequency;
  const lc = ad.linkClicks || 0;
  const cvr = lc > 0 ? +(orders / lc * 100).toFixed(2) : null;
  const type = cfg?.type || 'prospecting';

  // ── Parent context flags ──
  const adSetSpend = parentAdSet?.spend || 0;
  const adSetRoas  = parentAdSet?.roas;
  const adSetFailing  = adSetSpend >= 10000 && adSetRoas != null && adSetRoas < 1.0;
  const adSetCritical = adSetSpend >= 15000 && adSetRoas != null && adSetRoas < 0.6;
  const campSpend = parentCampaign?.spend || 0;
  const campRoas  = parentCampaign?.roas;
  const campFailing = campSpend >= 20000 && campRoas != null && campRoas < 1.0;

  // ── UNIVERSAL · frequency emergencies (all stages) ──
  if (freq != null && freq > 3.5) return { level: 'pause',   text: 'PAUSE · freq fatigue >3.5x', why: `Freq ${fx(freq)} · burning audience` };
  if (freq != null && freq > 3.0) return { level: 'refresh', text: 'REFRESH · freq >3.0x',       why: `Freq ${fx(freq)} · creative fatigue active` };

  // ── EARLY KILL · parent-context aware (the honest fix) ──
  if (adSetCritical && orders === 0 && spend >= 2000) {
    return { level: 'kill', text: 'KILL · ad set critical', why: `Parent ad set ${fx(adSetRoas)} (${inrK(adSetSpend)}) · this ad 0 orders at ${inrK(spend)} · no path` };
  }
  if (adSetFailing && orders === 0 && spend >= 3000) {
    return { level: 'kill', text: 'KILL · parent failing', why: `Parent ad set at ${fx(adSetRoas)} · this ad 0 orders at ${inrK(spend)}` };
  }
  if (campFailing && orders === 0 && spend >= 3000) {
    return { level: 'kill', text: 'KILL · campaign failing', why: `Campaign at ${fx(campRoas)} · this ad 0 orders at ${inrK(spend)}` };
  }

  // ── UNIVERSAL · 0 orders at ₹5K = automatic kill ──
  if (orders === 0 && spend >= 5000) {
    return { level: 'kill', text: 'KILL · 0 orders at ₹5K+', why: `${inrK(spend)} spent · zero conversions · cap reached` };
  }
  // Catastrophic ROAS: <0.3x at ₹5K+
  if (spend >= 5000 && roas != null && roas < 0.3) {
    return { level: 'kill', text: 'KILL · ROAS catastrophic', why: `${fx(roas)} at ${inrK(spend)} · destroying contribution margin` };
  }
  // CVR collapsed: <0.3% CVR on ≥800 clicks = severe creative/LP failure
  if (cvr != null && cvr < 0.3 && lc >= 800) {
    return { level: 'kill', text: 'KILL · CVR collapsed', why: `${pct(cvr,2)} CVR on ${lc} clicks · creative or landing broken` };
  }

  // ── COLD PROSPECTING (Sheet 16 Section 3) ──
  if (type === 'prospecting') {
    if (spend >= 15000 && roas != null) {
      if (roas < 1.0) return { level: 'kill', text: 'KILL within 24hr', why: `${fx(roas)} at ${inrK(spend)} · below 1.0x at ₹15K gate (PDF rule)` };
      if (roas < 1.4) {
        // Don't suggest "refresh" if the parent is also failing — that's dishonest
        if (adSetFailing || campFailing) return { level: 'kill', text: 'KILL · parent context bad', why: `${fx(roas)} · refresh won't recover with parent at ${fx(adSetFailing?adSetRoas:campRoas)}` };
        return { level: 'refresh', text: 'REFRESH hook · 7d', why: `${fx(roas)} at ₹15K · Higgsfield hook variant test, 7d window` };
      }
      if (roas >= 1.5) return { level: 'scale', text: 'PROMOTE +20%', why: `${fx(roas)} winner · brief 2 derivatives` };
      return { level: 'hold', text: 'Hold · in 1.4-1.5x band', why: `${fx(roas)} at ${inrK(spend)}` };
    }
    // Below ₹15K gate — Day-7 early kill rule (Sheet 16 Section 2): "kill any ad <0.7x ROAS"
    if (spend >= 5000 && roas != null && roas < 0.7) {
      return { level: 'kill', text: 'EARLY KILL · <0.7x', why: `${fx(roas)} at ${inrK(spend)} · Day-7 early kill rule` };
    }
    if (spend >= 3000 && roas != null && roas < 0.5) {
      return { level: 'kill', text: 'EARLY KILL · ROAS far below', why: `${fx(roas)} at ${inrK(spend)} · no realistic recovery path` };
    }
    if (spend >= 4000 && cvr != null && cvr < 0.5 && lc >= 300) {
      return { level: 'refresh', text: 'REFRESH · CVR weak', why: `${pct(cvr,2)} CVR · hook variant before ₹15K gate` };
    }
    if (spend < 1500) {
      return { level: 'early', text: 'Too early to judge', why: `${inrK(spend)} of ₹15K signal gate · let it run` };
    }
    if (orders === 0 && spend >= 2000) {
      return { level: 'watch', text: 'WATCH · 0 orders', why: `${inrK(spend)} · 0 orders so far · kill at ₹5K if no change` };
    }
    return { level: 'early', text: 'Building signal', why: `${inrK(spend)} of ₹15K gate · ${roas != null ? fx(roas) : '—'} so far` };
  }

  // ── HOT DPA (C7) ──
  if (cfg?.slot === 'C7') {
    if (spend >= 5000 && roas != null && roas < 2.0) {
      return { level: 'audit', text: 'CATALOG FEED AUDIT', why: `${fx(roas)} at ${inrK(spend)} · check feed images/prices · DPA failures = feed not creative` };
    }
    if (roas != null && roas >= 3.5) return { level: 'scale', text: 'SCALE +25%', why: `${fx(roas)} · highest-leverage scaling` };
    if (roas != null && roas >= 2.5) return { level: 'hold',  text: 'Hold · DPA in band', why: `${fx(roas)}` };
    return { level: 'early', text: 'Building signal', why: `${inrK(spend)} of ₹5K spend gate` };
  }

  // ── WARM RT (C8) ──
  if (type === 'retargeting') {
    if (spend >= 8000 && roas != null) {
      if (roas < 1.5) return { level: 'kill', text: 'KILL within 48hr', why: `${fx(roas)} at ${inrK(spend)} · warm should easily ≥1.5x` };
      if (roas >= 2.5) return { level: 'scale', text: 'PROMOTE · derivatives', why: `${fx(roas)} · strong warm performer` };
      return { level: 'hold', text: 'Hold · in band', why: `${fx(roas)}` };
    }
    return { level: 'early', text: 'Building signal', why: `${inrK(spend)} of ₹8K spend gate` };
  }

  // ── REACTIVATION (C9) ──
  if (type === 'reactivation') {
    if (spend >= 5000 && roas != null) {
      if (roas < 2.5) return { level: 'refresh', text: 'REFRESH hook + window', why: `${fx(roas)} at ${inrK(spend)} · past buyers should hit 4x+` };
      if (roas >= 5.0) return { level: 'scale', text: 'SCALE +30% · gold', why: `${fx(roas)} · highest-ROAS in account` };
      return { level: 'hold', text: 'Hold · in band', why: `${fx(roas)}` };
    }
    return { level: 'early', text: 'Building signal', why: `${inrK(spend)} of ₹5K spend gate` };
  }

  return { level: 'hold', text: 'Monitor', why: '' };
}

/* ═══ PER-AD-SET ACTION ENGINE · diagnostic, not just status ═══════ */
function evalAdSetAction(adset, cfg, parentCampaign) {
  if (!adset || !adset.hasSpend) return { level: 'idle', text: 'No spend yet', why: '' };
  const spend = adset.spend || 0;
  const roas = adset.roas;
  const orders = adset.purchases || 0;
  const freq = adset.frequency;
  const aov = adset.aov;
  const type = cfg?.type || 'prospecting';

  // Universal kills
  if (freq != null && freq > 3.5) return { level: 'pause', text: 'PAUSE · freq >3.5x', why: `Burning audience at ${fx(freq)}` };
  if (orders === 0 && spend >= 5000) {
    return { level: 'pause', text: `PAUSE · 0 orders at ${inrK(spend)}`, why: `Zero conversions · creative or audience broken` };
  }

  // 7-day ROAS <0.8x = pause (PDF Section 3 ad-set level)
  if (roas != null && roas < 0.8 && spend >= 8000) {
    return {
      level: 'kill',
      text: `KILL · ${inrK(spend)} for ${orders} order${orders!==1?'s':''}`,
      why: `${fx(roas)} = losing ${Math.round((1-roas)*100)}% of every ₹1 spent` + (aov && cfg.targetAov && aov < cfg.targetAov*0.7 ? ` · AOV ${inr(aov)} vs target ${inr(cfg.targetAov)}` : '')
    };
  }

  // Below 1.0x at ₹10K+
  if (roas != null && roas < 1.0 && spend >= 10000) {
    return {
      level: 'kill',
      text: 'KILL · below 1.0x at ₹10K+',
      why: `${fx(roas)} · ${inrK(spend)} for ${orders} order${orders!==1?'s':''} @ AOV ${inr(aov)}`
    };
  }

  // Stage-specific PDF kill threshold
  if (type === 'prospecting' && roas != null && cfg.killRoas && roas < cfg.killRoas && spend >= (cfg.killSpend || 15000)) {
    return { level: 'kill', text: `KILL · below ${cfg.killRoas}x at ${inrK(cfg.killSpend)}+`, why: `${fx(roas)} · ${inrK(spend)} spent` };
  }

  // AOV diagnostic — bundle target far off
  if (aov != null && cfg.targetAov && aov < cfg.targetAov * 0.6 && spend >= 5000 && orders >= 1) {
    return {
      level: 'refresh',
      text: 'REFRESH · bundle AOV failing',
      why: `AOV ${inr(aov)} = ${Math.round(aov/cfg.targetAov*100)}% of bundle target ${inr(cfg.targetAov)} · creative not selling bundle OR PDP not enforcing`
    };
  }

  // Frequency refresh
  if (freq != null && freq > 3.0) return { level: 'refresh', text: 'REFRESH · freq fatigue', why: `Freq ${fx(freq)}` };

  // Scale signals
  if (roas != null && type === 'prospecting' && roas >= 1.5) {
    return { level: 'scale', text: 'PROMOTE +20%', why: `${fx(roas)} winner` };
  }
  if (roas != null && type === 'retargeting' && roas >= 2.5) {
    return { level: 'scale', text: 'PROMOTE · strong RT', why: `${fx(roas)}` };
  }
  if (roas != null && type === 'reactivation' && roas >= 5.0) {
    return { level: 'scale', text: 'SCALE +30%', why: `${fx(roas)} · gold` };
  }

  if (spend < 5000) return { level: 'early', text: 'Building signal', why: `${inrK(spend)} of signal range` };
  return { level: 'hold', text: 'Monitor', why: `${fx(roas)} at ${inrK(spend)}` };
}

/* ═══ CAMPAIGN DIAGNOSTIC · "Why target not achieved" ══════════════ */
function diagnoseCampaign(data, detail, cfg, phase) {
  if (!data || !cfg) return null;
  const issues = [];
  const actions = [];
  let severity = 'healthy';

  const spend = data.spend || 0;
  const roas = data.roas;
  const aov = data.aov;
  const targetAov = cfg.targetAov;
  const phaseRoas = cfg.predictedRoas[phaseKey(phase.phaseNo)];
  const killRoas = cfg.killRoas;

  // ── ROAS diagnostic ──
  if (roas != null && roas < killRoas && spend >= cfg.killSpend) {
    severity = 'critical';
    issues.push({
      title: `ROAS ${fx(roas)} below kill floor ${fx(killRoas)}`,
      detail: `${inrK(spend)} spent · target band ${fmtBand(phaseRoas,'x')} for Phase ${phase.phaseNo} · contribution-${roas < 1.0 ? 'destroying' : 'negative'}`,
    });
  } else if (roas != null && phaseRoas && roas < phaseRoas[0] && spend >= 5000) {
    severity = 'warning';
    issues.push({
      title: `ROAS ${fx(roas)} below phase ${phase.phaseNo} target floor ${fx(phaseRoas[0])}`,
      detail: `Target band ${fmtBand(phaseRoas,'x')} · ${Math.round((phaseRoas[0]-roas)/phaseRoas[0]*100)}% gap to band bottom`,
    });
  }

  // ── AOV diagnostic — biggest "why" insight for bundle campaigns ──
  if (aov != null && targetAov && aov < targetAov * 0.7 && spend >= 5000) {
    issues.push({
      title: `AOV ${inr(aov)} = only ${Math.round(aov/targetAov*100)}% of target ${inr(targetAov)}`,
      detail: cfg.product === 'core_pair'
        ? `Core Pair anchor ₹7,800 · realized ${inr(aov)} means buyers picking SINGLE SKUs, not the bundle. Either creative isn't selling bundle value, OR /collections/core-pair PDP isn't enforcing bundle pricing at checkout.`
        : cfg.product === 'trio'
        ? `Trio anchor ₹10,950 · realized ${inr(aov)} means trio not converting · audit /collections/premium-trio PDP and creative messaging.`
        : `Single-cart AOV well below target — check upsell, bundle visibility, free-ship threshold.`,
    });
    if (severity === 'healthy') severity = 'warning';
  }

  // ── Ad-set failures ──
  if (detail?.adsets) {
    const failingAS = detail.adsets.filter(s => s.hasSpend && (s.spend >= 8000) && (s.roas == null || s.roas < 1.0));
    if (failingAS.length > 0) {
      issues.push({
        title: `${failingAS.length} ad set${failingAS.length>1?'s':''} below 1.0x at ₹8K+ spend`,
        detail: failingAS.map(s => `${(s.name.split('_')[1] || s.name).slice(0,28)}: ${fx(s.roas)} · ${inrK(s.spend)} · ${s.purchases||0} order${s.purchases!==1?'s':''}`).join(' · '),
      });
      if (severity === 'healthy') severity = 'warning';
    }
  }

  // ── Ad-level kill count ──
  if (detail?.ads) {
    const verdicts = detail.ads.filter(a => a.hasSpend).map(a => {
      const parentAS = detail.adsets?.find(s => s.id === a.adsetId);
      return evalAdAction(a, cfg, parentAS, data);
    });
    const killN  = verdicts.filter(v => v.level === 'kill').length;
    const pauseN = verdicts.filter(v => v.level === 'pause').length;
    const scaleN = verdicts.filter(v => v.level === 'scale').length;
    if (killN + pauseN > 0) {
      issues.push({
        title: `${killN + pauseN} ad${(killN+pauseN)>1?'s':''} flagged for immediate stop`,
        detail: `${killN} KILL · ${pauseN} PAUSE` + (scaleN ? ` · ${scaleN} SCALE candidate${scaleN>1?'s':''}` : '') + ' — see ad table below',
      });
    }
  }

  // ── Trend diagnostic ──
  const daily = (data.daily || []).filter(d => d.spend > 0);
  if (daily.length >= 3) {
    const recent3 = daily.slice(-3).map(d => d.roas);
    const allNum = recent3.every(r => r != null);
    if (allNum) {
      const declining = recent3[2] < recent3[1] && recent3[1] < recent3[0];
      const lastZero = (daily[daily.length-1].roas || 0) === 0;
      if (declining || lastZero) {
        issues.push({
          title: lastZero ? 'Latest day · 0.00x ROAS · no revenue captured' : 'ROAS declining 3 days in a row',
          detail: recent3.map(r => fx(r)).join(' → ') + (lastZero ? ' · campaign generated no revenue in the last 24h' : ' · accelerating downward'),
        });
      }
    }
  }

  // ── Action recommendations ──
  const hasAOVissue  = issues.some(i => i.title.includes('AOV'));
  const hasFailingAS = issues.some(i => i.title.includes('ad set'));
  if (severity === 'critical') {
    if (hasFailingAS)  actions.push('Pause failing ad sets immediately (those <1.0x at ₹8K+) — see ad-set table');
    if (hasAOVissue && cfg.product !== 'dpa') {
      actions.push(`Audit ${cfg.product === 'trio' ? '/collections/premium-trio' : '/collections/core-pair'} PDP — does bundle pricing enforce at checkout? Test add-to-cart flow.`);
      actions.push('Brief 3 NEW bundle creatives with explicit price-anchor messaging: "Bundle of 2: ₹7,800 vs ₹8,998 separately"');
    }
    actions.push('Do NOT scale or duplicate this campaign. Halt new ad-set additions.');
    actions.push('If no recovery in 7 days, pause the entire campaign and rebuild creative library.');
  } else if (severity === 'warning') {
    actions.push('Kill ads flagged below; refresh hooks where flagged REFRESH');
    actions.push('Watch trend daily — if no recovery in 7d at this spend level, pause.');
  }

  return { severity, issues, actions };
}

/* ═══ CONVERSION FUNNEL COMPUTATION ════════════════════════════════ */
function computeFunnel(data) {
  const i = data.impressions || 0;
  const lc = data.linkClicks || 0;
  const ac = data.atc || 0;
  const ic = data.ic || 0;
  const p = data.purchases || 0;
  return {
    impressions: i,
    linkClicks: lc,
    linkCtr:     i  > 0 ? +((lc / i)  * 100).toFixed(2) : null,
    atc: ac,
    atcRate:     lc > 0 ? +((ac / lc) * 100).toFixed(2) : null,
    ic,
    icRate:      ac > 0 ? +((ic / ac) * 100).toFixed(2) : null,
    purchases: p,
    icToPurchase: ic > 0 ? +((p / ic) * 100).toFixed(2) : null,
    overallCvr:  lc > 0 ? +((p / lc) * 100).toFixed(2) : null,
    dropImpToClick:  i  > 0 ? +((1 - lc/i)  * 100).toFixed(1) : null,
    dropClickToAtc:  lc > 0 ? +((1 - ac/lc) * 100).toFixed(1) : null,
    dropAtcToIc:     ac > 0 ? +((1 - ic/ac) * 100).toFixed(1) : null,
    dropIcToBuy:     ic > 0 ? +((1 - p/ic)  * 100).toFixed(1) : null,
  };
}

// Per-stage benchmarks (phase-agnostic; tighten via config later if needed)
const FUNNEL_BENCH = {
  linkCtr:      { target: 1.5, kill: 1.0, fmt: '%' },
  atcRate:      { target: 5.0, kill: 3.0, fmt: '%' },
  icRate:       { target: 60,  kill: 40,  fmt: '%' },
  icToPurchase: { target: 48.8, kill: 36, fmt: '%' },
};

/* ═══ PER-CAMPAIGN GOLD KPIs · MER / NC-ROAS / AOV / Contrib / etc ═ */
// Honest computation: what's possible per-campaign vs account-only.
function campaignGoldKpis(camp, cfg, phase) {
  if (!camp || !cfg) return [];
  const pk = phaseKey(phase.phaseNo);
  const spend = camp.spend || 0;
  const revenue = camp.revenue || 0;
  const orders = camp.purchases || 0;
  const GM = CFG.business.grossMargin;
  const ship = CFG.business.shippingPerOrder;
  const contribMargin = spend > 0 ? Math.round(revenue * GM - spend - orders * ship) : null;
  const predicted = cfg.predictedRoas?.[pk];
  const ncRoasBand = CFG.kpis.ncRoas?.bands?.[pk];
  const isPros = cfg.type === 'prospecting';
  const isReact = cfg.type === 'reactivation';
  // Status helpers
  const aovStatus = camp.aov == null ? 'idle' : camp.aov >= cfg.targetAov ? 'met' : camp.aov >= cfg.targetAov * 0.85 ? 'risk' : 'under';
  const cmStatus  = contribMargin == null ? 'idle' : contribMargin >= 0 ? 'met' : contribMargin >= -5000 ? 'risk' : 'under';
  return [
    { key:'mer', label:'MER', sublabel:'Campaign ROAS',
      value: camp.roas, target: predicted?.[0], targetBand: predicted, fmt:'x', inverse:false,
      available: true,
      status: predicted && camp.roas != null ? evalBand(camp.roas, predicted, false) : 'idle',
      mgmt: 'Revenue per ₹1 of ad spend on this campaign' },
    { key:'ncRoas', label:'NC-ROAS', sublabel: isPros ? 'New customer ROAS' : isReact ? 'N/A · reactivation' : 'N/A · retargeting',
      value: isPros ? camp.roas : null,
      target: isPros && ncRoasBand ? ncRoasBand[0] : null,
      targetBand: isPros ? ncRoasBand : null,
      fmt:'x', inverse:false,
      available: isPros,
      status: isPros && ncRoasBand && camp.roas != null ? evalBand(camp.roas, ncRoasBand, false) : 'idle',
      unavailableReason: isReact ? 'Reactivation targets past purchasers · NC-ROAS only for prospecting' : 'Retargeting hits returning visitors · NC-ROAS only for prospecting',
      mgmt: 'For prospecting, this equals campaign ROAS since audience excludes past purchasers' },
    { key:'aov', label:'AOV', sublabel:'Average Order Value',
      value: camp.aov, target: cfg.targetAov,
      targetBand: [cfg.targetAov * 0.85, cfg.targetAov * 1.3], fmt:'₹', inverse:false,
      available: true, status: aovStatus,
      mgmt: cfg.product === 'core_pair' ? 'Core Pair bundle anchor ₹7,800' : cfg.product === 'trio' ? 'Trio anchor ₹10,950' : 'Single-cart target' },
    { key:'contribMargin', label:'Contribution Margin', sublabel: 'Profit after COGS + Ad + Shipping',
      value: contribMargin, target: 0, targetBand: [0, null], fmt:'₹', inverse:false,
      available: spend > 0, status: cmStatus,
      detail: spend > 0 ? `${inrK(revenue)} × ${(GM*100).toFixed(0)}% GM = ${inrK(revenue*GM)} · minus ${inrK(spend)} ad · minus ${orders} × ₹${ship} ship` : null,
      mgmt: 'Money this campaign actually generated after all costs · must be ≥ ₹0' },
    { key:'cacPayback', label:'CAC Payback', sublabel:'Months to recover acquisition cost',
      value: null, target: CFG.kpis.cacPayback?.bands?.[pk]?.[1], fmt:'mo', inverse:true,
      available: false, status: 'idle',
      unavailableReason: 'Account-level only · needs Shopify LTV cohort wiring',
      mgmt: 'Tracked at account level · per-campaign needs Shopify customer cohort split' },
    { key:'repeatRate', label:'Repeat Rate', sublabel:'60-day repeat purchase rate',
      value: null, target: CFG.kpis.repeatRate?.bands?.[pk]?.[0], fmt:'%', inverse:false,
      available: false, status: 'idle',
      unavailableReason: 'Account-level only · needs Shopify customer database',
      mgmt: 'Tracked at account level · per-campaign attribution requires Shopify cohort export' },
    { key:'cac', label:'CAC', sublabel:'Cost per Acquisition · this campaign',
      value: camp.cpa, target: cfg.targetCpa, targetBand: [0, cfg.cpaCap], fmt:'₹', inverse:true,
      available: orders > 0, status: camp.cpa == null ? 'idle' : camp.cpa <= cfg.targetCpa ? 'met' : camp.cpa <= cfg.cpaCap ? 'risk' : 'under',
      mgmt: `Target ${inr(cfg.targetCpa)} · cap ${inr(cfg.cpaCap)} for this campaign` },
  ];
}

// ── 1) EXECUTIVE HEADER (status banner + headline number) ───────────
function ExecutiveHeader({ data, actuals, phase, kpiRows }) {
  const merRow = kpiRows.find(r => r.key === 'mer');

// ── 4) CONVERSION FUNNEL · Impressions → Click → ATC → IC → Purchase ─
function ConversionFunnelPanel({ data }) {
  const [open, setOpen] = useState(true);
  if (!data || (data.impressions || 0) === 0) return null;
  const f = computeFunnel(data);
  // 5 stages with cascading bar widths
  const stages = [
    { key: 'imp',  name: 'Impressions',  value: f.impressions, fmt: 'n',   bar: 100, dropFromPrev: null,  rateFromPrev: null,                        rateLabel: '',         note: 'Total ad views' },
    { key: 'lc',   name: 'Link Clicks',  value: f.linkClicks,  fmt: 'n',   bar: f.impressions > 0 ? Math.max(2, f.linkClicks / f.impressions * 100) : 0,  dropFromPrev: f.dropImpToClick, rateFromPrev: f.linkCtr,       rateLabel: 'Link CTR', note: 'People who tap the ad', bench: FUNNEL_BENCH.linkCtr },
    { key: 'atc',  name: 'Add to Cart',  value: f.atc,         fmt: 'n',   bar: f.impressions > 0 ? Math.max(1.5, f.atc / f.impressions * 100 * 4) : 0, dropFromPrev: f.dropClickToAtc, rateFromPrev: f.atcRate,       rateLabel: 'ATC rate', note: 'PDP merch · price · trust signal', bench: FUNNEL_BENCH.atcRate },
    { key: 'ic',   name: 'Init. Checkout', value: f.ic,        fmt: 'n',   bar: f.impressions > 0 ? Math.max(1, f.ic / f.impressions * 100 * 8) : 0,    dropFromPrev: f.dropAtcToIc,    rateFromPrev: f.icRate,        rateLabel: 'IC rate',  note: 'Cart → checkout intent', bench: FUNNEL_BENCH.icRate },
    { key: 'buy',  name: 'Purchase',     value: f.purchases,   fmt: 'n',   bar: f.impressions > 0 ? Math.max(0.8, f.purchases / f.impressions * 100 * 12) : 0, dropFromPrev: f.dropIcToBuy, rateFromPrev: f.icToPurchase,  rateLabel: 'IC → Buy', note: 'Razorpay/GoKwik checkout health (was 48.8% · 36% today)', bench: FUNNEL_BENCH.icToPurchase },
  ];
  // The biggest leak stage = highest drop-off
  const drops = stages.slice(1).map(s => ({ name: s.name, drop: s.dropFromPrev, rate: s.rateFromPrev, label: s.rateLabel, bench: s.bench }));
  const biggestLeak = drops.reduce((a, b) => (a.drop || 0) > (b.drop || 0) ? a : b);
  // Worst stage vs benchmark
  const stageStatus = s => {
    if (!s.bench || s.rateFromPrev == null) return 'idle';
    if (s.rateFromPrev >= s.bench.target) return 'met';
    if (s.rateFromPrev >= s.bench.kill)   return 'risk';
    return 'under';
  };
  const worstStage = stages.slice(1).reduce((worst, cur) => {
    const ws = stageStatus(worst), cs = stageStatus(cur);
    const rank = { under:3, risk:2, met:1, idle:0 };
    return rank[cs] > rank[ws] ? cur : worst;
  });
  const worstStatus = stageStatus(worstStage);
  return (<div className="card mb-3">
    <div className="flex items-center justify-between px-4 py-3 cursor-pointer hover:bg-white/[.02] select-none" onClick={()=>setOpen(!open)}>
      <div>
        <div className="sec-hd">Conversion Funnel · CRO Diagnostic · Section 4 of plan</div>
        <div className="text-xl font-bold text-stone-100 mt-0.5">From Impression to Purchase · {f.overallCvr != null ? <span className="text-amber-500 mono">{pct(f.overallCvr,2)} overall CVR</span> : <span className="text-stone-500 text-base">no data</span>}</div>
      </div>
      <div className="flex items-center gap-2">
        {worstStatus === 'under' && <span className="chip under text-[9px]">{worstStage.name} leaking</span>}
        {worstStatus === 'risk'  && <span className="chip risk text-[9px]">{worstStage.name} at risk</span>}
        {worstStatus === 'met'   && <span className="chip met text-[9px]">All stages healthy</span>}
        <span className="text-stone-600">{open?'▲':'▼'}</span>
      </div>
    </div>
    {open && (<div className="border-t border-stone-800/40 sd">
      {/* Stage cards */}
      <div className="p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-2">
        {stages.map((s, idx) => {
          const stat = stageStatus(s);
          return (<div key={s.key} className="relative">
            {idx > 0 && (<div className="hidden lg:block absolute -left-1.5 top-1/2 -translate-y-1/2 text-stone-700 text-lg">→</div>)}
            <div className={`card !border-stone-800/60 p-2.5 ${stat==='under'?'!border-red-900/50':stat==='risk'?'!border-amber-900/40':''}`}>
              <div className="flex items-baseline justify-between">
                <div className="text-[9px] uppercase tracking-widest text-stone-500 mono">{s.name}</div>
                {s.bench && <span className={`dot ${stat}`}/>}
              </div>
              <div className="text-2xl font-extrabold mono text-stone-100 mt-1">{num(s.value)}</div>
              {s.rateFromPrev != null && (<div className="text-[10px] mt-1">
                <span className="text-stone-600 mono">{s.rateLabel} </span>
                <span className={`mono font-bold ${stColor(stat)}`}>{pct(s.rateFromPrev, 2)}</span>
                {s.bench && <span className="text-stone-600 mono"> · goal ≥{s.bench.target}%</span>}
              </div>)}
              {s.dropFromPrev != null && (<div className="text-[10px] text-stone-500 mono mt-0.5">{pct(s.dropFromPrev, 1)} drop-off</div>)}
              <div className="text-[10px] text-stone-600 mt-1.5 leading-snug">{s.note}</div>
            </div>
          </div>);
        })}
      </div>
      {/* Leak diagnosis bar */}
      <div className="border-t border-stone-800/40 px-4 py-3">
        <div className="sec-hd mb-1.5">Biggest Funnel Leak</div>
        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div>
            <span className="text-sm font-bold text-stone-100">{biggestLeak.name}</span>
            <span className="mono text-stone-500 text-[11px] ml-2">losing {pct(biggestLeak.drop, 1)} at this stage</span>
          </div>
          <div className="text-[11px] text-stone-400 mono">
            {biggestLeak.label}: <span className="text-stone-200 font-bold">{pct(biggestLeak.rate, 2)}</span>
            {biggestLeak.bench && <span className="text-stone-600"> · goal ≥{biggestLeak.bench.target}%</span>}
          </div>
        </div>
        <div className="text-[11px] text-amber-400 mt-1.5">
          {worstStage.key === 'lc'  && '▸ Hook/creative or audience problem — first-3-sec audit and refresh top ads'}
          {worstStage.key === 'atc' && '▸ Landing page problem — bounce, pricing visibility, trust badges, mobile speed'}
          {worstStage.key === 'ic'  && '▸ Cart-to-checkout friction — UPI first, free-ship threshold visible, sticky CTA'}
          {worstStage.key === 'buy' && '▸ Checkout completion problem — OTP delivery rate, address autofill, payment ordering. PDP Section 8 CO-1–CO-8.'}
        </div>
      </div>
    </div>)}
  </div>);
}

// ── 5) FUNNEL STAGE ALLOCATION ──────────────────────────────────────
function StagePanel({ data, phase }) {
  const stages = { prospecting:{spend:0,rev:0,orders:0}, retargeting:{spend:0,rev:0,orders:0}, reactivation:{spend:0,rev:0,orders:0} };
  (data.campaigns||[]).forEach(c => { const t = SLOT_MAP[c.slot]?.type; if (t) { stages[t].spend += c.spend||0; stages[t].rev += c.revenue||0; stages[t].orders += c.purchases||0; } });
  const total = stages.prospecting.spend + stages.retargeting.spend + stages.reactivation.spend;
  const targetMix = CFG.stageAllocation[phaseKey(phase.phaseNo)];
  const order = ['prospecting','retargeting','reactivation'];
  return (<div className="card mb-3">
    <div className="px-4 py-3">
      <div className="sec-hd">Funnel Stage Allocation · Phase {phase.phaseNo} Target</div>
      <div className="text-base font-bold text-stone-100 mt-0.5">Where the money is going vs where it should</div>
    </div>
    <div className="border-t border-stone-800/40 px-4 py-3 divide-y divide-stone-800/30">
      {order.map(t => {
        const actualPct = total > 0 ? +(stages[t].spend / total * 100).toFixed(1) : 0;
        const targetPct = targetMix[t];
        const gap = actualPct - targetPct;
        const status = Math.abs(gap) <= 5 ? 'met' : Math.abs(gap) <= 10 ? 'risk' : 'under';
        const roas = stages[t].spend > 0 ? +(stages[t].rev/stages[t].spend).toFixed(2) : null;
        return (<div key={t} className="py-2.5 first:pt-0 last:pb-0 grid grid-cols-2 md:grid-cols-[1fr_1fr_1fr_1fr_1fr] gap-2 items-center">
          <div className="col-span-2 md:col-span-1">
            <div className="text-sm font-bold text-stone-100 uppercase">{t}</div>
            <div className="text-[10px] mono text-stone-500">{(data.campaigns||[]).filter(c=>SLOT_MAP[c.slot]?.type===t).length} camp · ROAS {fx(roas)}</div>
          </div>
          <div>
            <div className="text-[9px] uppercase text-stone-600 mono">Goal</div>
            <div className="mono text-sm text-stone-300">{targetPct}%</div>
          </div>
          <div>
            <div className="text-[9px] uppercase text-stone-600 mono">Actual</div>
            <div className={`mono text-base font-bold ${stColor(status)}`}>{actualPct}%</div>
          </div>
          <div>
            <div className="text-[9px] uppercase text-stone-600 mono">Spend</div>
            <div className="mono text-sm text-stone-300">{inrK(stages[t].spend)}</div>
          </div>
          <div className="text-right">
            <span className={`chip ${status} text-[9px]`}>{status==='met'?'ON TARGET':status==='risk'?'OFF BY '+Math.abs(gap).toFixed(0)+'pp':'WAY OFF '+Math.abs(gap).toFixed(0)+'pp'}</span>
          </div>
        </div>);
      })}
    </div>
  </div>);
}

// ── 5) AUDIENCE SEGMENTS (age × gender) ─────────────────────────────
function SegmentsPanel({ data, phase }) {
  if (!data.segments || data.segments.length === 0) {
    return (<div className="card mb-3 px-4 py-3">
      <div className="sec-hd">Audience Segments · Age × Gender</div>
      <div className="text-[11px] text-stone-500 italic mt-1">No segment breakdown available — Meta breakdown call returned empty. Ensure account has age/gender data permission.</div>
    </div>);
  }
  // Map each segment to actuals
  const map = {};
  data.segments.forEach(s => {
    const k = s.gender + '.' + s.age;
    if (!map[k]) map[k] = { spend:0, rev:0, orders:0 };
    map[k].spend += s.spend || 0;
    map[k].rev += s.revenue || 0;
    map[k].orders += s.purchases || 0;
  });
  const totalSpend = Object.values(map).reduce((s,v)=>s+v.spend,0);
  const rows = CFG.segments.map(seg => {
    const k = seg.key.toLowerCase();
    const ageOnly = k.split('.')[1];
    const genOnly = k.startsWith('f') ? 'female' : 'male';
    const composite = `${genOnly}.${ageOnly}`;
    const actual = map[composite] || { spend:0, rev:0, orders:0 };
    const roas = actual.spend > 0 ? +(actual.rev/actual.spend).toFixed(2) : null;
    const spendPct = totalSpend > 0 ? +(actual.spend/totalSpend*100).toFixed(1) : 0;
    let status = 'idle';
    if (seg.kill) {
      // Must be zero
      if (actual.spend > 0) status = 'under';
      else status = 'met';
    } else if (seg.targetRoas && roas != null) {
      status = evalBand(roas, seg.targetRoas, false);
    }
    return { seg, actual, roas, spendPct, status };
  });
  return (<div className="card mb-3">
    <div className="px-4 py-3">
      <div className="sec-hd">Audience Segments · Age × Gender · Action Plan Section 9</div>
      <div className="text-base font-bold text-stone-100 mt-0.5">Goldmine vs Kill list</div>
    </div>
    <div className="border-t border-stone-800/40 hidden md:grid items-center px-4 py-2 border-b border-stone-800/30 text-[9px] uppercase tracking-widest text-stone-500 mono"
         style={{gridTemplateColumns:'1.4fr 0.8fr 1fr 1fr 0.9fr 1.6fr'}}>
      <div>Segment</div><div className="text-right">Goal ROAS</div><div className="text-right">Actual ROAS</div><div className="text-right">Spend Share</div><div className="text-center">Status</div><div>Action</div>
    </div>
    <div className="divide-y divide-stone-800/30">
      {rows.map(r => (<div key={r.seg.key} className={`row-h px-4 py-2.5 grid grid-cols-2 md:grid-cols-[1.4fr_0.8fr_1fr_1fr_0.9fr_1.6fr] gap-x-3 gap-y-1 items-center ${r.seg.kill && r.actual.spend > 0 ? 'bg-red-950/20' : ''}`}>
        <div className="col-span-2 md:col-span-1">
          <div className="flex items-center gap-2">
            <span className={`dot ${r.status}`}/>
            <span className="text-sm font-semibold text-stone-100">{r.seg.label}</span>
          </div>
          <div className="text-[10px] mono text-stone-500 mt-0.5 ml-3.5">{r.seg.tag} · {r.seg.revShare}% rev historical</div>
        </div>
        <div className="text-right"><div className="text-[8px] uppercase text-stone-600 md:hidden mono">Goal</div><div className="mono text-sm text-stone-300">{r.seg.targetRoas ? fmtBand(r.seg.targetRoas,'x') : 'N/A'}</div></div>
        <div className="text-right"><div className="text-[8px] uppercase text-stone-600 md:hidden mono">Actual</div><div className={`mono text-base font-bold ${stColor(r.status)}`}>{fx(r.roas)}</div><div className="text-[9px] mono text-stone-600">spent {inrK(r.actual.spend)}</div></div>
        <div className="text-right"><div className="text-[8px] uppercase text-stone-600 md:hidden mono">Spend</div><div className="mono text-sm text-stone-300">{r.spendPct}%</div>{r.seg.targetSpendShare && <div className="text-[9px] mono text-stone-600">tgt {r.seg.targetSpendShare[0]}-{r.seg.targetSpendShare[1]}%</div>}</div>
        <div className="text-center col-span-2 md:col-span-1"><div className="text-[8px] uppercase text-stone-600 md:hidden mono">Status</div><span className={`chip ${r.status} text-[9px]`}>{r.seg.kill ? (r.actual.spend > 0 ? 'EXCLUSION BROKEN' : 'EXCLUDED OK') : STATUS_LABEL[r.status]}</span></div>

  </div>);
}

// ── 6) CAMPAIGN MATRIX · 9 cards each showing all 6 Gold KPIs ────
function CampaignCard({ cfg, data, days, phase, onExpand }) {
  const pk = phaseKey(phase.phaseNo);
  const targetBudget = cfg.dailyBudget[pk];
  const expectedSpend = targetBudget * days;
  const has = data && (data.spend || 0) > 0;
  const goldKpis = data ? campaignGoldKpis(data, cfg, phase) : [];
  const spendR = expectedSpend > 0 && data ? tapg({ target: expectedSpend, achieved: data.spend||0, cumulative: true }) : null;
  const killCheck = data ? evalKillRule(data) : null;
  // Overall status from available gold KPIs
  const availableStatuses = goldKpis.filter(k => k.available).map(k => k.status);
  const overallStatus = killCheck && killCheck.level === 'kill' ? 'under'
    : availableStatuses.includes('under') ? 'under'
    : availableStatuses.includes('risk') ? 'risk'
    : has && availableStatuses.length > 0 && availableStatuses.every(s => s === 'met') ? 'met'
    : has ? 'risk' : 'idle';

  const cleanName = cfg.name.replace('BROAD · ', '').replace(/ · F\d+-\d+/, '').replace(' CITIES', '');

  return (<div onClick={() => data && onExpand()}
       className={`card lift cursor-pointer ${!data ? 'opacity-40 cursor-default' : ''} ${overallStatus==='under'?'!border-red-900/40':overallStatus==='risk'?'!border-amber-900/40':overallStatus==='met'?'!border-emerald-900/30':''}`}>
    <div className="p-3.5">
      {/* Header */}
      <div className="flex items-start justify-between gap-2 mb-2">
        <div className="min-w-0 flex-1">
          <div className="flex items-center gap-1.5 mb-1">
            <span className="mono text-[13px] font-extrabold text-stone-100">{cfg.slot}</span>
            <span className="text-[9px] uppercase tracking-wider text-stone-500 font-bold">
              {cfg.type === 'prospecting' ? 'PROSPECT' : cfg.type === 'retargeting' ? 'RETARGET' : 'REACTIVATE'}
            </span>
            {cfg.product === 'core_pair' && <span className="text-[8px] font-bold text-amber-500">· CORE PAIR</span>}
            {cfg.product === 'trio'      && <span className="text-[8px] font-bold text-emerald-500">· TRIO</span>}
            {cfg.product === 'dpa'       && <span className="text-[8px] font-bold text-blue-400">· DPA</span>}
          </div>
          <div className="text-[11px] text-stone-400 leading-snug line-clamp-1" title={cfg.name}>{cleanName}</div>
        </div>
        <span className={`dot ${overallStatus} mt-1 flex-shrink-0`}/>
      </div>

      {/* Status / Kill action banner */}
      <div className="mb-2.5">
        {killCheck ? (
          <div className={`chip ${killCheck.level==='kill'?'under':killCheck.level==='scale'?'met':'risk'} text-[10px] w-full justify-center`} style={{display:'flex',padding:'5px 6px'}}>
            ▸ {killCheck.action.toUpperCase()}
          </div>
        ) : (
          <div className={`chip ${overallStatus} text-[10px] w-full justify-center`} style={{display:'flex',padding:'5px 6px'}}>
            {STATUS_LABEL[overallStatus]}
          </div>
        )}
      </div>

      {/* The 6 Gold KPIs */}
      <div className="space-y-0">
        {goldKpis.slice(0, 6).map((kpi, i) => (
          <div key={kpi.key} className={`flex items-baseline justify-between gap-2 py-1.5 text-[11px] ${i > 0 ? 'border-t border-stone-800/30' : ''}`} title={kpi.mgmt || ''}>
            <div className="min-w-0 flex-1">
              <div className="text-stone-200 font-semibold">{kpi.label}</div>
              <div className="text-[9px] mono text-stone-600 truncate" title={kpi.unavailableReason || ''}>
                {kpi.available
                  ? (kpi.targetBand
                      ? `goal ${fmtBand(kpi.targetBand, kpi.fmt)}`
                      : `goal ${kpi.inverse ? '≤' : '≥'}${fmtV(kpi.target, kpi.fmt)}`)
                  : 'account-level only'}
              </div>
            </div>
            <div className="text-right flex-shrink-0">
              <div className={`mono font-bold text-[14px] leading-tight ${kpi.available ? stColor(kpi.status) : 'text-stone-600'}`}>
                {kpi.value != null ? fmtV(kpi.value, kpi.fmt) : '—'}
              </div>
              {kpi.available && kpi.value != null && kpi.target != null && (() => {
                const gap = kpi.inverse ? kpi.target - kpi.value : kpi.value - kpi.target;
                const gapPct = kpi.target !== 0 ? +(gap / Math.abs(kpi.target) * 100).toFixed(0) : null;
                if (gapPct == null || Math.abs(gapPct) < 1) return null;
                return (<div className={`text-[9px] mono ${stColor(kpi.status)}`}>{gap >= 0 ? '+' : ''}{gapPct}%</div>);
              })()}
            </div>
          </div>
        ))}
      </div>

      {/* Footer */}
      <div className="mt-2.5 pt-2 border-t border-stone-800/50 text-[10px] mono">
        <div className="flex justify-between text-stone-500">
          <span title="Phase target daily budget">{inrK(targetBudget)}/day · {data?.purchases || 0} orders</span>
          <span className={data?.frequency > 3 ? 'text-amber-400' : ''}>{data?.frequency != null ? `Freq ${fx(data.frequency)}` : ''}</span>
        </div>
        <div className="text-right mt-0.5 text-amber-500 font-bold">tap for ad-level →</div>
      </div>
    </div>
  </div>);
}

// ── 7) CAMPAIGN DIAGNOSTIC BANNER · "Why target not achieved" ───────
function CampaignDiagnosticBanner({ diagnosis }) {
  if (!diagnosis || diagnosis.severity === 'healthy' || diagnosis.issues.length === 0) return null;
  const sev = diagnosis.severity;
  const sevColor = sev === 'critical' ? 'under' : 'risk';
  const sevLabel = sev === 'critical' ? 'CRITICAL · INTERVENE TODAY' : 'WARNING · ACT THIS WEEK';
  return (<div className={`status-banner ${sevColor} mb-3`}>
    <div className="flex items-baseline justify-between mb-2 flex-wrap gap-2">
      <div>
        <div className="sec-hd">Diagnostic · why target not achieved</div>
        <div className="text-base font-bold text-stone-100 mt-0.5">{diagnosis.issues.length} issue{diagnosis.issues.length>1?'s':''} identified · root causes below</div>
      </div>
      <span className={`chip ${sevColor} text-[10px]`}>{sevLabel}</span>
    </div>
    <div className="space-y-2.5 mt-3">
      {diagnosis.issues.map((iss, i) => (
        <div key={i} className="text-[12px] border-l-2 pl-3" style={{borderColor: sev==='critical'?'rgba(239,68,68,.4)':'rgba(245,158,11,.4)'}}>
          <div className="font-semibold text-stone-100">▸ {iss.title}</div>
          <div className="text-[11px] text-stone-400 mt-0.5 leading-snug">{iss.detail}</div>
        </div>
      ))}
    </div>
    {diagnosis.actions.length > 0 && (<div className="mt-3 pt-3 border-t border-stone-800/40">
      <div className="sec-hd mb-1.5">Recommended actions · in priority order</div>
      <ol className="space-y-1 text-[11px] text-amber-300 ml-1">
        {diagnosis.actions.map((a, i) => (
          <li key={i} className="leading-snug"><span className="text-stone-600 mono mr-1.5">{i+1}.</span>{a}</li>
        ))}
      </ol>
    </div>)}
  </div>);
}

// ── 8) INTERACTIVE TRENDS CHART (account-level + campaign filter) ───
function TrendsPanel({ data }) {
  const [open, setOpen] = useState(true);
  const [metric, setMetric] = useState('roas');
  const [scope, setScope] = useState('all');
  if (!data?.dailyData?.length) return null;
  const METRICS = {
    roas:    { label:'ROAS',     fmt:'x', target:1.6,   kill:1.4,  colour:'#f59e0b', accessor:d=>d.roas },
    spend:   { label:'Spend',    fmt:'₹', target:null,  kill:null, colour:'#a8a29e', accessor:d=>d.spend },
    revenue: { label:'Revenue',  fmt:'₹', target:null,  kill:null, colour:'#10b981', accessor:d=>d.revenue },
    cpa:     { label:'CPA',      fmt:'₹', target:3200,  kill:4000, colour:'#f87171', accessor:d=>d.cpa, inverse:true },
    aov:     { label:'AOV',      fmt:'₹', target:7800,  kill:5000, colour:'#34d399', accessor:d=>d.aov },
    purchases:{ label:'Orders',   fmt:'n', target:null,  kill:null, colour:'#fbbf24', accessor:d=>d.purchases },
  };
  const M = METRICS[metric];
  const allCamps = data.campaigns || [];
  let series = [], seriesLabel = 'Account total';
  if (scope === 'all') {
    series = data.dailyData.filter(d => (d.spend||0) > 0);
    seriesLabel = 'Account total';
  } else if (['prospecting','retargeting','reactivation'].includes(scope)) {
    const stageCamps = allCamps.filter(c => SLOT_MAP[c.slot]?.type === scope);
    const dayMap = {};
    stageCamps.forEach(c => (c.daily||[]).forEach(d => {
      if (!dayMap[d.date]) dayMap[d.date] = { date:d.date, spend:0, revenue:0, purchases:0, impressions:0, clicks:0, reach:0 };
      dayMap[d.date].spend += d.spend||0;
      dayMap[d.date].revenue += d.revenue||0;
      dayMap[d.date].purchases += d.purchases||0;
      dayMap[d.date].impressions += d.impressions||0;
      dayMap[d.date].clicks += d.clicks||0;
      dayMap[d.date].reach = Math.max(dayMap[d.date].reach, d.reach||0);
    }));
    series = Object.values(dayMap).sort((a,b)=>a.date.localeCompare(b.date)).map(d => ({
      ...d,
      roas: d.spend>0 ? +(d.revenue/d.spend).toFixed(2) : null,
      cpa: d.purchases>0 ? Math.round(d.spend/d.purchases) : null,
      aov: d.purchases>0 ? Math.round(d.revenue/d.purchases) : null,
    }));
    seriesLabel = scope.toUpperCase() + ' stage · ' + stageCamps.length + ' camp';
  } else {
    const c = allCamps.find(x => x.id === scope);
    if (c) { series = (c.daily||[]).filter(d => (d.spend||0) > 0); seriesLabel = `${c.slot} · ${c.name}`; }
  }
  return (<div className="card mb-3">
    <div className="flex items-center justify-between px-4 py-3 cursor-pointer hover:bg-white/[.02]" onClick={()=>setOpen(!open)}>
      <div><div className="sec-hd">Interactive Trends · {seriesLabel} · {series.length} days</div>
        <div className="text-xl font-bold text-stone-100 mt-0.5">{M.label} over time · values labeled</div></div>
      <span className="text-stone-600">{open?'▲':'▼'}</span>
    </div>
    {open && (<div className="border-t border-stone-800/40 p-4 sd">
      <div className="flex flex-wrap items-center gap-2 mb-2.5">
        <span className="sec-hd !mb-0">Metric</span>
        {Object.entries(METRICS).map(([k,v]) => (<button key={k} onClick={e=>{e.stopPropagation();setMetric(k);}} className={`pill ${metric===k?'active':''}`}>{v.label}</button>))}
      </div>
      <div className="flex flex-wrap items-center gap-2 mb-4 pb-3 border-b border-stone-800/30">
        <span className="sec-hd !mb-0">Scope</span>
        <button onClick={e=>{e.stopPropagation();setScope('all');}} className={`pill ${scope==='all'?'active':''}`}>Total</button>
        <span className="text-stone-700 mx-0.5">·</span>
        {[['prospecting','Prospect'],['retargeting','Retarget'],['reactivation','React']].map(([k,l]) => (<button key={k} onClick={e=>{e.stopPropagation();setScope(k);}} className={`pill ${scope===k?'active':''}`}>{l}</button>))}
        <span className="text-stone-700 mx-0.5">·</span>
        {allCamps.filter(c=>c.slot).sort((a,b)=>a.slot.localeCompare(b.slot)).map(c => (<button key={c.id} onClick={e=>{e.stopPropagation();setScope(c.id);}} className={`pill ${scope===c.id?'active':''}`} title={c.name}>{c.slot}</button>))}
      </div>
      {series.length === 0 ? <div className="text-stone-500 text-xs py-8 text-center">No spend in this scope for the selected range.</div> : <TimeChart data={series} metric={M}/>}
    </div>)}
  </div>);
}

function TimeChart({ data, metric }) {
  const W = 820, H = 280, P = 50, PB = 46;
  const pts = data.map(d => ({ date:d.date, v: metric.accessor(d) })).filter(p => p.v != null);
  if (!pts.length) return <div className="text-stone-500 text-xs py-8 text-center">No data for this metric.</div>;
  const vals = pts.map(p => p.v);
  const mn = Math.min(0, ...vals, metric.target||0, metric.kill||0);
  const mx = Math.max(...vals, metric.target||0, metric.kill||0) * 1.15;
  const scale = v => H - PB - ((v - mn) / (mx - mn)) * (H - P - PB);
  const xStep = pts.length > 1 ? (W - P*2) / (pts.length - 1) : 0;
  const x = i => P + i * xStep;
  const path = pts.map((p,i) => (i===0?'M':'L') + x(i) + ',' + scale(p.v)).join(' ');
  const area = path + ` L${x(pts.length-1)},${scale(Math.max(0,mn))} L${x(0)},${scale(Math.max(0,mn))} Z`;
  const fmtLabel = v => {
    if (v == null) return '—';
    if (metric.fmt === 'x') return Number(v).toFixed(2) + 'x';
    if (metric.fmt === '%') return Number(v).toFixed(1) + '%';
    if (metric.fmt === '₹') { const a = Math.abs(v); if (a >= 100000) return (v<0?'−₹':'₹')+Math.abs(v/100000).toFixed(1)+'L'; if (a >= 1000) return (v<0?'−₹':'₹')+Math.abs(v/1000).toFixed(1)+'k'; return inr(v); }
    return num(v);
  };
  const labelEvery = Math.max(1, Math.ceil(pts.length / 12));
  const xTickStep = Math.max(1, Math.ceil(pts.length / 8));
  return (<div>
    <svg viewBox={`0 0 ${W} ${H+20}`} className="w-full" style={{maxHeight:'340px'}} preserveAspectRatio="xMidYMid meet">
      {[0,0.25,0.5,0.75,1].map((p,i) => { const y = P + p*(H-P-PB); const v = mx - p*(mx-mn); return (<g key={i}><line x1={P} y1={y} x2={W-P} y2={y} stroke="#292524" strokeWidth="1" strokeDasharray={i===0||i===4?'':'2,3'}/><text x={P-6} y={y+3} fill="#78716c" fontSize="9" textAnchor="end" fontFamily="IBM Plex Mono">{fmtLabel(v)}</text></g>); })}
      {metric.target != null && <g><line x1={P} y1={scale(metric.target)} x2={W-P} y2={scale(metric.target)} stroke="#f59e0b" strokeWidth="1.5" strokeDasharray="5,3"/><rect x={W-P-100} y={scale(metric.target)-13} width="100" height="13" fill="#0d0c0b"/><text x={W-P-2} y={scale(metric.target)-3} fill="#f59e0b" fontSize="10" textAnchor="end" fontFamily="IBM Plex Mono" fontWeight="bold">goal {fmtLabel(metric.target)}</text></g>}
      {metric.kill != null && <g><line x1={P} y1={scale(metric.kill)} x2={W-P} y2={scale(metric.kill)} stroke="#dc2626" strokeWidth="1" strokeDasharray="3,3"/><rect x={W-P-100} y={scale(metric.kill)+3} width="100" height="13" fill="#0d0c0b"/><text x={W-P-2} y={scale(metric.kill)+13} fill="#dc2626" fontSize="10" textAnchor="end" fontFamily="IBM Plex Mono" fontWeight="bold">{metric.inverse?'cap':'kill'} {fmtLabel(metric.kill)}</text></g>}
      <path d={area} fill={metric.colour} opacity="0.10"/>
      <path d={path} fill="none" stroke={metric.colour} strokeWidth="2.2" strokeLinejoin="round"/>
      {pts.map((p,i) => {
        const xx = x(i), yy = scale(p.v);
        const onTarget = metric.target != null ? (metric.inverse ? p.v <= metric.target : p.v >= metric.target) : true;
        const ringCol = onTarget ? metric.colour : '#ef4444';
        const labelAbove = yy > (P + (H-P-PB)*0.45);
        const ly = labelAbove ? yy - 9 : yy + 15;
        const showLabel = (i % labelEvery === 0) || i === pts.length - 1 || i === 0;
        return (<g key={i}>
          <circle cx={xx} cy={yy} r="4" fill={ringCol} stroke="#0d0c0b" strokeWidth="1.5"/>
          {showLabel && (<g>
            <rect x={xx-24} y={ly-9} width="48" height="13" fill="#0d0c0b" opacity="0.88" rx="2"/>
            <text x={xx} y={ly+1} fill={onTarget?'#e7e5e4':'#fca5a5'} fontSize="10" textAnchor="middle" fontFamily="IBM Plex Mono" fontWeight="bold">{fmtLabel(p.v)}</text>
          </g>)}
        </g>);
      })}
      {pts.map((p,i) => { if (i%xTickStep!==0 && i!==pts.length-1) return null; const dt = new Date(p.date+'T12:00:00'); return (<text key={i} x={x(i)} y={H+12} fill="#78716c" fontSize="9" textAnchor="middle" fontFamily="IBM Plex Mono">{dt.toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</text>); })}
      {pts.length>0 && (() => { const xx = x(pts.length-1); const yy = scale(pts[pts.length-1].v); return (<g><line x1={xx} y1={P} x2={xx} y2={H-PB} stroke={metric.colour} strokeWidth="0.5" strokeDasharray="2,3" opacity="0.4"/><circle cx={xx} cy={yy} r="7" fill="none" stroke={metric.colour} strokeWidth="1.5" opacity="0.7"/></g>); })()}
    </svg>
    <div className="mt-2 flex flex-wrap items-center justify-between gap-2 text-[11px] mono">
      <div className="flex items-center gap-3 flex-wrap">
        <span className="text-stone-500">Latest <span className="text-stone-100 font-bold ml-1">{fmtLabel(pts[pts.length-1].v)}</span></span>
        <span className="text-stone-500">Avg <span className="text-stone-300 ml-1">{fmtLabel(vals.reduce((s,v)=>s+v,0)/vals.length)}</span></span>
        <span className="text-stone-500">Min <span className="text-stone-300 ml-1">{fmtLabel(Math.min(...vals))}</span></span>
        <span className="text-stone-500">Max <span className="text-stone-300 ml-1">{fmtLabel(Math.max(...vals))}</span></span>
      </div>
      {metric.target != null && <span className="text-stone-500">Days on target <span className="text-stone-100 font-bold ml-1">{pts.filter(p => metric.inverse ? p.v <= metric.target : p.v >= metric.target).length}/{pts.length}</span></span>}
    </div>
  </div>);
}

function ChecklistPanel() {

    const next = { ...checked, [n]: !checked[n] };

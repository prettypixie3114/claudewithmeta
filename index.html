    </div>
    {open && (<div className="border-t border-stone-800/40 px-4 py-3 sd">
      <div className="tbar mb-3"><div className="tbar-fill" style={{width:pct+'%',background:pct===100?'#10b981':'#f59e0b'}}/></div>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-1">
        {CFG.preflightChecklist.map(item => (<label key={item.n} className="flex items-start gap-2 py-1.5 px-2 hover:bg-white/[.02] rounded-sm cursor-pointer">
          <input type="checkbox" checked={!!checked[item.n]} onChange={()=>toggle(item.n)} className="mt-0.5 accent-amber-500"/>
          <div className="flex-1 min-w-0">
            <div className={`text-[11px] leading-snug ${checked[item.n]?'text-stone-500 line-through':'text-stone-200'}`}><span className="mono text-stone-600">#{item.n}</span> {item.item}</div>
            <div className="text-[9px] mono text-stone-600">{item.category} · {item.verifier}</div>
          </div>
        </label>))}
      </div>
    </div>)}
  </div>);
}

// ── 10) TOKEN MODAL ─────────────────────────────────────────────────
function TokenModal({ onSave }) {
  const [tok, setTok] = useState('');
  const [err, setErr] = useState('');
  const [testing, setTesting] = useState(false);
  const go = async () => {
    if (!tok.trim()) { setErr('Paste your Meta Access Token'); return; }
    setTesting(true); setErr('');
    try {
      const r = await fetch(`${BASE}/me?fields=name&access_token=${tok.trim()}`);
      const d = await r.json();
      if (d.error) throw new Error(d.error.message);
      localStorage.setItem('meta_token', tok.trim());
      onSave(tok.trim());
    } catch (e) { setErr('Token error: ' + e.message); }
    finally { setTesting(false); }
  };
  return (<div className="fixed inset-0 z-50 flex items-center justify-center px-4" style={{background:'rgba(0,0,0,.85)',backdropFilter:'blur(8px)'}}>
    <div className="w-full max-w-lg card p-6 sm:p-8 space-y-5">
      <div><div className="sec-hd mb-1">Pretty Pixie · Fashion Forever</div><div className="text-xl font-bold text-stone-100">Performance Command Center</div><div className="text-[11px] text-stone-500 mt-1">Meta System User token required</div></div>
      <div><label className="sec-hd block mb-2">Meta Access Token</label><textarea value={tok} onChange={e=>setTok(e.target.value)} rows={4} className="w-full bg-stone-900/80 border border-stone-700 text-stone-100 px-3 py-2.5 text-xs outline-none focus:border-amber-600 rounded-sm mono resize-none" placeholder="EAAQzImg59n..."/></div>
      {err && <div className="px-3 py-2 bg-red-950/30 border border-red-800/50 text-red-300 text-xs rounded-sm">{err}</div>}
      <button onClick={go} disabled={testing} className="w-full bg-amber-600 hover:bg-amber-500 disabled:opacity-50 text-stone-950 font-bold py-3 text-sm rounded-sm uppercase tracking-widest">{testing?<><span className="spin">↻</span> Verifying…</>:'Connect Dashboard'}</button>
    </div>
  </div>);
}

/* ═══ MAIN DASHBOARD ═══════════════════════════════════════════════ */
function Dashboard({ token, onChangeToken }) {
  const [data, setData] = useState(null);
  const [err, setErr] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [lastSync, setLastSync] = useState(null);
  const [preset, setPreset] = useState('last_7d');
  const [custom, setCustom] = useState({ s:'', u:'' });
  const [useCustom, setUseCustom] = useState(false);
  const [showPicker, setShowPicker] = useState(false);
  const [expanded, setExpanded] = useState(null);
  const [detail, setDetail] = useState({});
  const [loadingDetail, setLoadingDetail] = useState({});
  const [autoRefresh, setAutoRefresh] = useState(() => {
    try { return parseInt(localStorage.getItem('pixie_autorefresh') || '0', 10); } catch { return 0; }
  });
  const [tick, setTick] = useState(0);  // forces re-render for "synced X ago" counter

  const dateQ = useMemo(() => useCustom && custom.s && custom.u
    ? `time_range=${encodeURIComponent(JSON.stringify({since:custom.s,until:custom.u}))}`
    : `date_preset=${preset}`, [useCustom, custom, preset]);
  const dateLabel = useMemo(() => useCustom && custom.s && custom.u ? `${custom.s} → ${custom.u}` : preset, [useCustom, custom, preset]);

  const sync = useCallback(async () => {
    setSyncing(true); setErr(null);
    try { const d = await fetchAll(token, dateQ); setData(d); setLastSync(new Date().toISOString()); }
    catch (e) { setErr(e.message); }
    finally { setSyncing(false); }
  }, [token, dateQ]);

  useEffect(() => { sync(); }, [sync]);

  // Auto-refresh interval (off / 5 / 15 / 30 min)
  useEffect(() => {
    localStorage.setItem('pixie_autorefresh', String(autoRefresh));
    if (autoRefresh === 0) return;
    const id = setInterval(() => sync(), autoRefresh * 60 * 1000);
    return () => clearInterval(id);
  }, [autoRefresh, sync]);

  // Tick every 10s so "synced X seconds ago" stays fresh
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 10000);
    return () => clearInterval(id);
  }, []);

  const loadDetail = useCallback(async (id) => {
    if (loadingDetail[id]) return;
    setLoadingDetail(p => ({ ...p, [id]: true }));
    try { const d = await fetchDetail(token, id, dateQ); setDetail(p => ({ ...p, [id]: d })); }
    catch (e) { console.error(e); }
    finally { setLoadingDetail(p => ({ ...p, [id]: false })); }
  }, [token, dateQ, loadingDetail]);

  const handleExpand = (id) => {
    if (expanded === id) setExpanded(null);
    else { setExpanded(id); if (!detail[id]) loadDetail(id); }
  };

  const phase = useMemo(() => currentPhase(), []);
  const slotData = useMemo(() => { if (!data?.campaigns) return {}; const m = {}; data.campaigns.forEach(c => { if (c.slot) m[c.slot] = c; }); return m; }, [data]);
  const expandedData = useMemo(() => data?.campaigns?.find(c => c.id === expanded), [expanded, data]);
  const expandedCfg = useMemo(() => expandedData ? SLOT_MAP[expandedData.slot] : null, [expandedData]);
  const days = useMemo(() => daysInRange(data?.dailyData), [data]);
  const actuals = useMemo(() => data ? computeActuals(data) : {}, [data]);
  const kpiRows = useMemo(() => data ? computeKpiRows(data, actuals, phase) : [], [data, actuals, phase]);
  const ruleResults = useMemo(() => data ? evalMarginRules(data, actuals, phase) : [], [data, actuals, phase]);

  return (<div className="min-h-screen pb-16">
    {/* Sticky header */}
    <div className="sticky top-0 z-40 border-b border-stone-800/60 no-print" style={{background:'rgba(13,12,11,.93)',backdropFilter:'blur(12px)'}}>
      <div className="wrap py-2">
        <div className="flex items-center justify-between gap-2 mb-1.5">
          <div className="flex items-center gap-2 min-w-0">
            <span className="text-sm font-bold text-stone-200">Pretty Pixie · Fashion Forever</span>
            <span className="text-stone-700">·</span>
            <span className="sec-hd hidden sm:block !mb-0">Performance Command Center · v5.1</span>
            {data && <div className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${syncing?'bg-amber-400 pulse':autoRefresh>0?'bg-emerald-500 pulse':'bg-emerald-500'}`}/>}
            {lastSync && (() => {
              const secs = Math.floor((Date.now() - new Date(lastSync).getTime()) / 1000);
              const ago = secs < 60 ? `${secs}s ago` : secs < 3600 ? `${Math.floor(secs/60)}m ago` : `${Math.floor(secs/3600)}h ago`;
              return (<span className="text-[10px] mono text-stone-500" title={new Date(lastSync).toLocaleString('en-IN')}>{syncing ? 'syncing…' : 'synced ' + ago}<span className="hidden sm:inline" data-tick={tick}/></span>);
            })()}
          </div>
          <div className="flex items-center gap-1.5">
            <select value={autoRefresh} onChange={e=>setAutoRefresh(parseInt(e.target.value,10))} className="text-[9px] mono bg-stone-800 border border-stone-700 text-stone-300 px-1.5 py-1.5 rounded-sm outline-none cursor-pointer" title="Auto-refresh">
              <option value="0">⏸ Manual</option>
              <option value="5">⟳ 5min</option>
              <option value="15">⟳ 15min</option>
              <option value="30">⟳ 30min</option>
            </select>
            <button onClick={()=>window.print()} className="text-[9px] px-2 py-1.5 border border-stone-700 text-stone-400 hover:text-stone-200 rounded-sm uppercase hidden sm:block">Print</button>
            {data && <DownloadForClaudeBtn data={data} actuals={actuals} phase={phase}/>}
            <button onClick={sync} disabled={syncing} className="text-[9px] px-3 py-1.5 bg-amber-600 hover:bg-amber-500 text-stone-950 font-bold rounded-sm disabled:opacity-50 uppercase tracking-widest">{syncing?<span className="spin">↻</span>:'Sync Now'}</button>
            <button onClick={onChangeToken} className="text-[9px] w-8 h-7 border border-stone-700 text-stone-500 hover:text-stone-300 rounded-sm flex items-center justify-center">⚙</button>
          </div>
        </div>
        <div className="presets-scroll">
          {CFG.datePresets.map(p => (<button key={p.v} onClick={()=>{setPreset(p.v);setUseCustom(false);setExpanded(null);setDetail({});}} className={`text-[10px] px-2 py-1 rounded-sm uppercase tracking-widest whitespace-nowrap ${(!useCustom&&preset===p.v)?'bg-stone-700 text-stone-100':'text-stone-500 hover:text-stone-300'}`}>{p.label}</button>))}
          <button onClick={()=>setShowPicker(!showPicker)} className={`text-[10px] px-2 py-1 rounded-sm whitespace-nowrap ${useCustom?'bg-amber-700 text-stone-100':'text-stone-500 hover:text-stone-300'}`}>📅 Custom</button>
          {showPicker && (<>
            <input type="date" value={custom.s} onChange={e=>setCustom(p=>({...p,s:e.target.value}))} className="bg-stone-800 border border-stone-700 text-stone-200 text-[10px] px-2 py-1 outline-none rounded-sm"/>
            <span className="text-stone-600">→</span>
            <input type="date" value={custom.u} onChange={e=>setCustom(p=>({...p,u:e.target.value}))} className="bg-stone-800 border border-stone-700 text-stone-200 text-[10px] px-2 py-1 outline-none rounded-sm"/>
            <button onClick={()=>{if(custom.s&&custom.u){setUseCustom(true);setShowPicker(false);}}} className="text-[10px] px-2 py-1 bg-amber-600 text-stone-950 font-bold rounded-sm">Go</button>
          </>)}
        </div>
      </div>
    </div>

    <div className="wrap pt-4">
      {err && <div className="mb-3 px-3 py-2.5 bg-red-950/30 border border-red-800/50 text-red-300 text-xs rounded-sm">{err} <button onClick={onChangeToken} className="underline ml-2">Update token</button></div>}
      {!data && !err && <div className="flex items-center justify-center py-32 text-stone-500 text-sm"><span className="spin mr-2">↻</span>Connecting to Meta API…</div>}

      {data && (<>
        {/* HERO STATUS BANNER */}
        <ExecutiveHeader data={data} actuals={actuals} phase={phase} kpiRows={kpiRows}/>

        {/* MARGIN PROTECTION RULES — first, so breaches surface immediately */}
        <MarginRulesPanel ruleResults={ruleResults}/>

        {/* EXECUTIVE SUMMARY — Goal / Where We Are / Status / What to Do */}
        <ExecutiveSummary kpiRows={kpiRows} phase={phase}/>

        {/* CONVERSION FUNNEL · CRO diagnostic */}
        <ConversionFunnelPanel data={data}/>

        {/* FUNNEL STAGE ALLOCATION */}
        <StagePanel data={data} phase={phase}/>

        {/* CAMPAIGN MATRIX */}
        <div className="flex items-baseline justify-between mb-2 mt-2 sec-divider">
          <div>
            <div className="sec-hd">9-Campaign Matrix · click any card for full detail</div>
            <div className="text-xl font-bold text-stone-100">Per-campaign · Goal · Where We Are · Gap</div>
          </div>
          <div className="text-right">
            <div className="text-[10px] mono text-stone-600">Target P{phase.phaseNo}: ₹{(CFG.phases[phase.phaseNo-1].dailyBudget).toLocaleString('en-IN')}/day · {CFG.assetTargets[phaseKey(phase.phaseNo)].activeAdSets} ad sets</div>
            <div className="text-[10px] mono text-stone-600">{data.campaigns?.filter(c=>c.effectiveStatus==='ACTIVE').length||0} of 9 active</div>
          </div>
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2.5 mb-3">
          {SLOTS.map(cfg => (<CampaignCard key={cfg.slot} cfg={cfg} data={slotData[cfg.slot]} days={days} phase={phase} onExpand={()=>slotData[cfg.slot]&&handleExpand(slotData[cfg.slot].id)}/>))}
        </div>

        {/* INTERACTIVE TRENDS */}
        <TrendsPanel data={data}/>

        {/* AUDIENCE SEGMENTS */}
        <SegmentsPanel data={data} phase={phase}/>

        {/* PRE-FLIGHT CHECKLIST */}
        <ChecklistPanel/>

        {/* FOOTER NOTE */}
        <div className="text-[10px] text-stone-600 mt-6 leading-relaxed mono">
          Pretty Pixie Performance Dashboard v5 · Targets locked from FashionForever Mar+Apr Analysis v6 ·
          Phase {phase.phaseNo} ({phase.name}) Day {phase.dayOfPhase}/{phase.days} ·
          Edit <code className="text-amber-500">config.js</code> on GitHub to update targets without touching app code.
        </div>
      </>)}
    </div>

    {expanded && expandedCfg && expandedData && (
      <CampaignDetail
        cfg={expandedCfg} data={expandedData} detail={detail[expanded]}
        loading={!!loadingDetail[expanded]} dateLabel={dateLabel} days={days} phase={phase}
        onClose={()=>setExpanded(null)}
        onReload={()=>{setDetail(p=>{const n={...p};delete n[expanded];return n;});loadDetail(expanded);}}
      />
    )}
  </div>);
}

/* ═══ DOWNLOAD FOR CLAUDE ══════════════════════════════════════════ */
function DownloadForClaudeBtn({ data, actuals, phase }) {
  const [state, setState] = useState('idle');
  const menuRef = useRef(null);
  const [open, setOpen] = useState(false);

  useEffect(() => {
    const close = e => { if (menuRef.current && !menuRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, []);

  const PROMPTS = [
    { label: '🔪 Kill / Scale / Hold all campaigns',    q: 'For every campaign with spend: KILL, SCALE, or HOLD verdict with exact ROAS and contribution margin. Flag every contribution-negative campaign with ⛔ STOP. End with NEXT 24H ACTIONS: 3 numbered tasks.' },
    { label: '📊 Full P&L — are we profitable?',        q: 'Analyze the full P&L. Total spend, revenue, contribution margin — profitable or not? What is the single biggest lever to fix in the next 7 days? Give the math and 3 actions by urgency.' },
    { label: '💰 Budget reallocation',                  q: 'Exactly where should I move budget right now to maximize contribution profit? Give ₹/day amounts to cut and increase per campaign. What ROAS improvement is expected?' },
    { label: '🎯 AOV gap — why ₹7,800 is not hit',      q: 'AOV is below ₹7,800. Diagnose the root cause — creative, PDP, or checkout. Give the top 3 fixes with specific actions.' },
    { label: '⚡ Emergency — stop the bleeding NOW',    q: 'EMERGENCY: which campaigns must be killed RIGHT NOW? Rank by ₹ lost per day. Give the campaign name, ROAS, daily spend, and action.' },
    { label: '🔄 Retargeting & reactivation audit',     q: 'Audit C7, C8, C9 retargeting and reactivation. Is frequency causing burnout? ROAS vs target? Go/no-go on each with changes needed in 48 hours.' },
    { label: '📈 Scaling plan — where to push harder',  q: 'Which campaigns are above target ROAS band and safe to scale? Give safe budget increase (%) and expected revenue uplift for next 3 days.' },
    { label: '🔍 Full performance scan',                q: 'Run a full performance scan. Check all kill rule violations, contribution margin leaks, stage mix vs target, funnel drop-offs. Give top 3 urgent actions for next 24 hours with ₹ numbers.' },
  ];

  const build = (question) => {
    const pk = 'p' + phase.phaseNo;
    const GM = CFG.business.grossMargin;
    const ship = CFG.business.shippingPerOrder;
    const camps = data.campaigns || [];
    const f = computeFunnel(data);

    const campLines = camps.map(c => {
      const cfg = SLOT_MAP[c.slot];
      const pred = cfg?.predictedRoas?.[pk];
      const cm = c.spend > 0 ? Math.round((c.revenue||0)*GM - (c.spend||0) - (c.purchases||0)*ship) : null;
      const band = pred ? (c.roas >= pred[1] ? '✅ABOVE' : c.roas >= pred[0] ? '🟡IN_BAND' : '🔴BELOW') : '—';
      const kr = evalKillRule(c);
      return `${c.slot||'unmapped'} | ${cfg?.type||'?'} | ROAS ${fx(c.roas)} | ${band} | Spend ${inrK(c.spend)} | Orders ${c.purchases||0} | AOV ${inr(c.aov)} | CM ${inrK(cm)}${kr?' | ⚠'+kr.level.toUpperCase()+': '+kr.action:''}`;
    }).join('\n');

    const stageSpend = { prospecting:0, retargeting:0, reactivation:0 };
    camps.forEach(c => { const t = SLOT_MAP[c.slot]?.type; if (t) stageSpend[t] += c.spend||0; });
    const totalS = Object.values(stageSpend).reduce((a,b)=>a+b,0)||1;
    const tgt = CFG.stageAllocation?.[pk]||{};

    return `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
PRETTY PIXIE · LIVE PERFORMANCE SNAPSHOT
${new Date().toLocaleString('en-IN',{dateStyle:'full',timeStyle:'short'})}
Phase ${phase.phaseNo} (${phase.name}) · Day ${phase.dayOfPhase}/${phase.days}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

ACCOUNT P&L
  Blended ROAS:  ${fx(data.roas)} (target ≥1.6x Phase ${phase.phaseNo} | ${data.roas>=1.6?'+'+((data.roas-1.6).toFixed(2))+'x ABOVE':((1.6-(data.roas||0)).toFixed(2))+'x BELOW TARGET'})
  Total Spend:   ${inrK(data.spend)}
  Revenue:       ${inrK(data.revenue)}
  Orders:        ${data.purchases||0}
  AOV:           ${inr(data.aov)} (target ₹7,800 | gap ${data.aov?inr(Math.abs(7800-data.aov)):'—'})
  CPA:           ${inr(data.cpa)}
  Frequency:     ${fx(data.frequency)}
  Contribution:  ${inrK(actuals?.contribMargin)} ${(actuals?.contribMargin||0)<0?'⛔ NEGATIVE — LOSING MONEY':'✅ POSITIVE'}
  Gross Margin:  ${(GM*100).toFixed(0)}% | Shipping: ₹${ship}/order

CONVERSION FUNNEL
  Link CTR:    ${pct(f.linkCtr,2)} (target ≥1.5%${f.linkCtr<1.0?' ⚠ CRITICAL':f.linkCtr<1.5?' ↓ below':' ✅'})
  ATC Rate:    ${pct(f.atcRate,2)} (target ≥5%${f.atcRate<3?' ⚠ CRITICAL':f.atcRate<5?' ↓ below':' ✅'})
  IC Rate:     ${pct(f.icRate,2)} (target ≥60%)
  IC→Purchase: ${pct(f.icToPurchase,2)} (target ≥48.8%${f.icToPurchase<36?' ⚠ CRITICAL':''})
  Overall CVR: ${pct(f.overallCvr,2)}

STAGE MIX (actual vs target)
  Prospecting:  ${((stageSpend.prospecting/totalS)*100).toFixed(1)}% (target ${tgt.prospecting||75}%)
  Retargeting:  ${((stageSpend.retargeting/totalS)*100).toFixed(1)}% (target ${tgt.retargeting||20}%)
  Reactivation: ${((stageSpend.reactivation/totalS)*100).toFixed(1)}% (target ${tgt.reactivation||5}%)

CAMPAIGN BREAKDOWN
SLOT | TYPE | ROAS | VS BAND | SPEND | ORDERS | AOV | CONTRIB MARGIN | STATUS
${campLines}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
${question}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;
  };

  const download = (question) => {
    setOpen(false);
    const txt = build(question);
    const now = new Date();
    const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
    const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `prettypixie-${stamp}.txt`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    setState('done'); setTimeout(()=>setState('idle'), 2500);
  };

  return (
    <button
      onClick={()=>download(PROMPTS[7].q)}
      style={{
        fontSize:'9px', padding:'5px 14px',
        background: state==='done' ? '#10b981' : 'linear-gradient(135deg,#d97706,#f59e0b)',
        color:'#0d0c0b', border:'none', borderRadius:'3px',
        fontWeight:'800', fontFamily:'IBM Plex Mono,monospace',
        cursor:'pointer', letterSpacing:'.05em', whiteSpace:'nowrap',
        boxShadow:'0 2px 8px rgba(245,158,11,.35)',
      }}
      title="One click: download full performance data → drag into Claude.ai for recommendations"
    >
      {state==='done' ? '✓ FILE READY — DRAG TO CLAUDE' : '↓ DOWNLOAD FOR CLAUDE'}
    </button>
  );
}

function App() {
  const [token, setToken] = useState(() => localStorage.getItem('meta_token') || '');
  const [showModal, setShowModal] = useState(() => !localStorage.getItem('meta_token'));
  const save = t => { setToken(t); setShowModal(false); };
  const change = () => { localStorage.removeItem('meta_token'); setToken(''); setShowModal(true); };
  return (<>
    {showModal && <TokenModal onSave={save}/>}
    {token && !showModal && <Dashboard token={token} onChangeToken={change}/>}
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
